name: Setup
description: Install Bun, pnpm, Node, and dependencies (checkout must happen first)

runs:
  using: composite
  steps:
    - name: Cache Bun binary
      uses: actions/cache@v4
      with:
        path: ~/.bun
        key: bun-${{ runner.os }}-${{ runner.arch }}-1.3.12
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.12"
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
