name: Setup
description: Install Bun, pnpm, Node, and dependencies (checkout must happen first)

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.12"
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    # node_modules cache layered on top of setup-node's pnpm-store cache.
    # The store cache speeds up cold installs; this one lets
    # `pnpm install --frozen-lockfile` short-circuit when the tree is already
    # materialized. Key includes os+arch+node major so native modules
    # (e.g. @aspect-build/node-pty on Windows) never cross ABI boundaries;
    # bump `v1` to invalidate if runner images change Node ABI unexpectedly.
    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
        key: node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node22-${{ hashFiles('pnpm-lock.yaml', '.npmrc', '**/package.json') }}
        restore-keys: |
          node-modules-v1-${{ runner.os }}-${{ runner.arch }}-node22-
    - run: pnpm install --frozen-lockfile
      shell: bash
