# Dependabot — automated dependency update PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Grouped + weekly to keep PR volume low. PR titles use conventional-commit
# prefixes so release-please treats dep bumps as `chore:`/`build:` (no version
# escalation). All ecosystems present in this repo are covered:
#   - cargo      (rust/ workspace — the entire backend + CLI)
#   - github-actions (workflow `uses:` pins under .github/workflows)
# (The npm ecosystem block was removed with the Node toolchain in #5 PR7 —
#  there is no JS/TS manifest left to update.)
version: 2

updates:
  # ── Rust dependencies (rust/ workspace) ───────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/rust"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      cargo-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions (workflow `uses:` pins) ────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-all:
        patterns:
          - "*"
    ignore:
      # dtolnay/rust-toolchain's git tag IS the Rust toolchain version, not an
      # action release — bumping it changes the COMPILER (and proposed nonexistent
      # 1.100.0). The toolchain is pinned by rust/rust-toolchain.toml; keep this
      # action tag in lockstep with that file MANUALLY, never via dependabot.
      - dependency-name: "dtolnay/rust-toolchain"
