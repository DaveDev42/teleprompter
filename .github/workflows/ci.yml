name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: |
          npx tsc --noEmit -p apps/daemon/tsconfig.json
          npx tsc --noEmit -p apps/cli/tsconfig.json
          npx tsc --noEmit -p apps/relay/tsconfig.json
          npx tsc --noEmit -p apps/runner/tsconfig.json

      - name: Test
        run: bun test packages/protocol apps/daemon apps/runner apps/cli apps/relay

      - name: Build CLI
        run: bun run scripts/build.ts

      - name: Smoke test
        run: |
          ./dist/tp version
          ./dist/tp --help

      - name: Build web frontend
        run: cd apps/frontend && npx expo export --platform web
