name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint & format check
        run: npx biome ci .

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Type check
        run: |
          pids=()
          npx tsc --noEmit -p packages/daemon/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p apps/cli/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/relay/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/runner/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p apps/app/tsconfig.json & pids+=($!)
          fail=0
          for pid in "${pids[@]}"; do wait "$pid" || fail=1; done
          exit $fail

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Test with coverage
        run: bun test --coverage packages/protocol packages/daemon packages/runner apps/cli packages/relay

  build-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build CLI
        run: bun run scripts/build.ts
      - name: Smoke test
        run: |
          ./dist/tp version
          ./dist/tp --help

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Cache Expo web build
        id: expo-cache
        uses: actions/cache@v4
        with:
          path: |
            apps/app/dist
            apps/app/node_modules/.cache
          key: expo-web-${{ runner.os }}-${{ hashFiles('apps/app/**/*.ts', 'apps/app/**/*.tsx', 'apps/app/app.json', 'packages/protocol/src/**/*.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            expo-web-${{ runner.os }}-

      - name: Build web frontend
        if: steps.expo-cache.outputs.cache-hit != 'true'
        run: cd apps/app && npx expo export --platform web

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright deps
        run: npx playwright install-deps chromium

      - name: Playwright E2E
        run: npx playwright test --project=ci

  test-windows:
    runs-on: windows-2022
    timeout-minutes: 15
    # Bun 1.3.6 panics after tests pass on Windows (oven-sh/bun#27471).
    # Allow failure so it doesn't block eas-gate. Remove when Bun fixes the panic.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Type check
        run: |
          npx tsc --noEmit -p packages/protocol/tsconfig.json
          npx tsc --noEmit -p packages/daemon/tsconfig.json
          npx tsc --noEmit -p apps/cli/tsconfig.json
          npx tsc --noEmit -p packages/relay/tsconfig.json
          npx tsc --noEmit -p packages/runner/tsconfig.json
        shell: bash

      - name: Test
        run: bun test packages/protocol packages/daemon packages/runner apps/cli packages/relay
        shell: bash

      - name: Build CLI
        run: bun run scripts/build.ts
        shell: bash

      - name: Smoke test
        run: |
          $bin = if (Test-Path "./dist/tp.exe") { "./dist/tp.exe" } else { "./dist/tp" }
          & $bin version
          & $bin --help
        shell: pwsh

  eas-gate:
    needs: [lint, type-check, test, build-cli, e2e, test-windows]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect app/protocol changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'packages/protocol/**'

      - uses: ./.github/actions/setup
        if: steps.changes.outputs.app == 'true'

      - name: Expo Doctor
        if: steps.changes.outputs.app == 'true'
        working-directory: apps/app
        run: npx expo doctor

      - name: Trigger EAS Build
        if: steps.changes.outputs.app == 'true' && env.EXPO_TOKEN != ''
        working-directory: apps/app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli build --platform all --profile preview --non-interactive
