name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint & format check
        run: pnpm exec biome ci .

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Type check
        run: |
          pids=()
          npx tsc --noEmit -p packages/protocol/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/daemon/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p apps/cli/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/relay/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/runner/tsconfig.json & pids+=($!)
          fail=0
          for pid in "${pids[@]}"; do wait "$pid" || fail=1; done
          exit $fail

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Test with coverage
        run: bun test --coverage --timeout 30000 packages/protocol packages/daemon packages/runner apps/cli packages/relay

  build-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build CLI
        run: bun run scripts/build.ts
      - name: Smoke test
        run: |
          ./dist/tp version
          ./dist/tp --help

      - name: Compiled binary runner spawn test
        run: |
          # Verify the compiled binary can spawn a runner process.
          # This catches $bunfs path resolution bugs (e.g. isCompiled() false positive).
          # Use timeout to prevent hanging — runner will fail (no claude) but must not crash
          # with "Module not found" before reaching that point.
          timeout 10 ./dist/tp --dangerously-skip-permissions -p "test" 2>&1 | tee /tmp/tp-smoke.log || true
          if grep -q 'Module not found' /tmp/tp-smoke.log; then
            echo "FATAL: Compiled binary failed to resolve runner module"
            cat /tmp/tp-smoke.log
            exit 1
          fi
          if grep -q '\[Runner\] started\|\[SessionManager\] spawned runner\|Claude Code CLI not found' /tmp/tp-smoke.log; then
            echo "Runner spawn OK (or claude not installed — expected in CI)"
          else
            echo "WARNING: Unexpected output — runner may not have spawned"
            cat /tmp/tp-smoke.log
          fi

  # Rust core (tp-core FFI + tp-proto message-type parity). Lint severity is the
  # `[workspace.lints]` table in rust/Cargo.toml — NOT a CLI flag — so the policy
  # lives in one place and `cargo clippy` (local) and CI agree byte-for-byte:
  # `clippy::all = "deny"` is the hard gate, `clippy::pedantic = "warn"` surfaces
  # stricter suggestions without blocking (ratchet to deny later). We deliberately
  # do NOT pass `-- -D warnings`: that flag would over-promote the pedantic group
  # to errors and break the build. `cargo fmt --check` enforces rustfmt.toml. The
  # test suite includes the TS↔Rust golden vectors (wire_vectors.rs,
  # message_vectors.rs) that prove byte-exact parity. Toolchain pinned by
  # rust/rust-toolchain.toml.
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      # Pin to the same channel as rust/rust-toolchain.toml so the action's
      # pre-install matches what rustup would auto-fetch (no double toolchain).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (severity from [workspace.lints]; all=deny gates)
        run: cargo clippy --workspace --all-targets
      - name: Test (incl. golden vectors)
        run: cargo test --workspace
