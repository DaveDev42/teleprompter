name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Expo web build
        id: expo-cache
        uses: actions/cache@v4
        with:
          path: |
            apps/app/dist
            apps/app/node_modules/.cache
          key: expo-web-${{ runner.os }}-${{ hashFiles('apps/app/**/*.ts', 'apps/app/**/*.tsx', 'apps/app/app.json', 'pnpm-lock.yaml') }}

      - name: Lint & format check
        run: npx biome ci .

      - name: Type check
        run: |
          npx tsc --noEmit -p packages/daemon/tsconfig.json
          npx tsc --noEmit -p apps/cli/tsconfig.json
          npx tsc --noEmit -p packages/relay/tsconfig.json
          npx tsc --noEmit -p packages/runner/tsconfig.json
          cd apps/app && npx tsc --noEmit && cd ../..

      - name: Test with coverage
        run: bun test --coverage packages/protocol packages/daemon packages/runner apps/cli packages/relay

      - name: Build CLI
        run: bun run scripts/build.ts

      - name: Smoke test
        run: |
          ./dist/tp version
          ./dist/tp --help

      - name: Build web frontend
        if: steps.expo-cache.outputs.cache-hit != 'true'
        run: cd apps/app && npx expo export --platform web

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright deps
        run: npx playwright install-deps chromium

      - name: Playwright E2E
        run: npx playwright test --project=ci
