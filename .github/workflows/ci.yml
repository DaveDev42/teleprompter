name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Lint & format check
        run: pnpm exec biome ci .

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Type check
        run: |
          pids=()
          npx tsc --noEmit -p packages/protocol/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/daemon/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p apps/cli/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/relay/tsconfig.json & pids+=($!)
          npx tsc --noEmit -p packages/runner/tsconfig.json & pids+=($!)
          fail=0
          for pid in "${pids[@]}"; do wait "$pid" || fail=1; done
          exit $fail

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Build the Rust tp-runner so the differential wire-parity gate
      # (packages/daemon/src/session/runner-parity.test.ts) RUNS instead of
      # SKIP-ing. That test drives the Bun runner AND the Rust tp-runner against
      # the same fake claude and asserts byte-identical hello/io/bye frames — the
      # load-bearing byte-exactness gate for the runner port (ADR-0003 Stage 4).
      # Without the binary present it degrades to SKIP, so building it here makes
      # the parity check an always-on backstop in CI. Pin matches
      # rust/rust-toolchain.toml (1.96.0).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build Rust tp-runner (parity-gate enabler)
        run: cargo build --release --bin tp-runner --manifest-path rust/Cargo.toml
      # Build the Rust tp-daemon-probe so the bidirectional shared-file store
      # parity gate (packages/daemon/src/store/store-rust-parity.test.ts) RUNS
      # instead of SKIP-ing. That test drives the Bun Store AND the Rust
      # tp-daemon store against one on-disk vault and asserts session/pairing/
      # record rows + BLOBs are byte-identical either direction — the
      # load-bearing byte-exactness gate for the daemon store port
      # (ADR-0003 Phase 4 inc1). Same SKIP-when-unbuilt → always-on-backstop
      # rationale as tp-runner above. The probe is a thin CLI over Store, NOT
      # the shipping daemon bin (that is inc5).
      - name: Build Rust tp-daemon-probe (store parity-gate enabler)
        run: cargo build --release --bin tp-daemon-probe --manifest-path rust/Cargo.toml
      - name: Test with coverage
        run: bun test --coverage --timeout 30000 packages/protocol packages/daemon packages/runner apps/cli packages/relay

  build-cli:
    runs-on: ubuntu-latest
    # Rust release build (~1-3 min) + Bun SEA (~30s) + smoke. 15m is comfortable.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Rust toolchain needed to build the Rust `tp` binary inside the bundle.
      # Pin matches rust/rust-toolchain.toml (1.96.0) — no double-toolchain fetch.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Build the bundle for the CI host (linux-x64 — ubuntu-latest is x86_64).
      # This is now THE release/CI path: bin/tp (Rust) + libexec/tp/tpd (Bun SEA)
      # packed into dist/bundles/tp-linux_x64.tar.gz.
      - name: Build bundle (Rust tp + Bun tpd tarball)
        run: bun run scripts/build.ts --bundle --target bun-linux-x64
      # Bundle-aware smoke: extract the tarball, mirror what install.sh does,
      # then verify the Rust→Bun blob seam without spawning a real daemon.
      - name: Bundle smoke — extract and verify layout
        run: |
          mkdir -p /tmp/tp-prefix
          tar -xzf dist/bundles/tp-linux_x64.tar.gz -C /tmp/tp-prefix --strip-components=1
          # Assert the prefix-tree layout exists before continuing.
          ls -la /tmp/tp-prefix/bin/tp
          ls -la /tmp/tp-prefix/libexec/tp/tpd
          echo "Layout OK: bin/tp + libexec/tp/tpd present"
      - name: Bundle smoke — version + help (native Rust paths)
        run: |
          timeout 10 /tmp/tp-prefix/bin/tp version
          timeout 10 /tmp/tp-prefix/bin/tp --help
      - name: Bundle smoke — Rust→blob forward seam (TP_BUN_BLOB echo script)
        run: |
          # Prove the Rust→Bun blob forward seam without spawning a real daemon.
          # TP_BUN_BLOB overrides locate_bun_blob() to use a tiny echo script that
          # prints its arguments — no daemon, no claude, deterministic + non-hanging.
          printf '#!/bin/sh\necho "BLOB_GOT:" "$@"\n' > /tmp/fake-tpd
          chmod +x /tmp/fake-tpd
          # tp -p x → pre-clap decide_route → Forward → exec_blob → fake-tpd
          GOT=$(timeout 10 env TP_BUN_BLOB=/tmp/fake-tpd /tmp/tp-prefix/bin/tp -p x 2>&1 || true)
          echo "Forward smoke output: ${GOT}"
          if echo "${GOT}" | grep -q 'BLOB_GOT: -p x'; then
            echo "Forward smoke PASS: Rust→blob seam works"
          else
            echo "FATAL: Forward smoke FAIL — expected 'BLOB_GOT: -p x'"
            exit 1
          fi

  # Rust core (tp-core FFI + tp-proto message-type parity). Lint severity is the
  # `[workspace.lints]` table in rust/Cargo.toml — NOT a CLI flag — so the policy
  # lives in one place and `cargo clippy` (local) and CI agree byte-for-byte:
  # `clippy::all = "deny"` is the hard gate, `clippy::pedantic = "warn"` surfaces
  # stricter suggestions without blocking (ratchet to deny later). We deliberately
  # do NOT pass `-- -D warnings`: that flag would over-promote the pedantic group
  # to errors and break the build. `cargo fmt --check` enforces rustfmt.toml. The
  # test suite includes the TS↔Rust golden vectors (wire_vectors.rs,
  # message_vectors.rs) that prove byte-exact parity. Toolchain pinned by
  # rust/rust-toolchain.toml.
  rust:
    runs-on: ubuntu-latest
    # 15 → 20: the normal fmt/clippy/test still finish well under 15m; the extra
    # headroom covers the light soak tier (≈1.5k loopback conns × 3 dimensions,
    # < ~1m) added as the last step below.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v7
      # Pin to the same channel as rust/rust-toolchain.toml so the action's
      # pre-install matches what rustup would auto-fetch (no double toolchain).
      # NOTE: this action's tag IS the Rust version — do NOT let dependabot bump
      # it (it proposed nonexistent 1.100.0). dependabot.yml ignores it; bump
      # this in lockstep with rust-toolchain.toml only.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (severity from [workspace.lints]; all=deny gates)
        run: cargo clippy --workspace --all-targets
      - name: Test (incl. golden vectors)
        run: cargo test --workspace
      # ── 10k capacity gate (light tier) ──────────────────────────────────────
      # ADR-0003 §6.9: the Stage-1 relay redesign must not lower the ~10k
      # concurrent-connection capacity bar. The soak (tests/soak_10k.rs) is ONE
      # parameterized harness driving all 3 load dimensions (pub fan-out + resume
      # storm + push-under-load). It is `#[ignore]`d so the `cargo test
      # --workspace` step above never opens thousands of sockets.
      #
      # heavy = local, light = CI: the FULL 10k run is heavy and runs locally on
      # demand (TP_SOAK_CONNS=10000 — see rust/README.md / relay-capacity.md).
      # CI runs a LIGHT scaled-down tier (same code path, smaller N) as the gate:
      # deterministic + fast (< ~1m) yet genuinely exercises every dimension.
      #
      # ubuntu-latest's default `ulimit -n` soft cap is 1024 — far too low for
      # ~1500 loopback sockets (daemon + N frontends, each a real TCP pair). We
      # raise it to 65535 for this step. The `rust` job is NOT a required check
      # (ci-workflows.md) so a flaky soak never blocks unrelated PRs — but it
      # MUST pass on the PR that introduces/changes the relay capacity path.
      - name: Soak — 10k capacity gate (light tier)
        run: |
          ulimit -n 65535
          TP_SOAK_CONNS=1500 TP_SOAK_SECS=20 \
            cargo test -p tp-relay --test soak_10k -- --ignored --nocapture

  # Swift app compile gate (B4, ADR-0002). Proves the Apple multiplatform SwiftUI
  # target builds — the xcframework (9 Rust Apple slices + UniFFI bindings) links
  # and the app compiles under Swift 6 strict concurrency — WITHOUT a developer's
  # machine. Compile-only on the native macOS destination (no Simulator boot, no
  # XCTest, no real-claude E2E — those stay local per native-testing.md). This is
  # the deterministic CI counterpart to the local `scripts/ios.sh smoke`.
  #
  # NOT a required check (ci-workflows.md): added non-required first so a flaky
  # macOS runner / SDK drift never wedges unrelated PRs. Promote to required only
  # after it is reliably green on main. The required gate stays lint/type-check/
  # test/build-cli.
  #
  # Runner is PINNED to macos-26 (NOT bare macos-latest, which is mid-migration
  # macos-15→macos-26). The app references the iOS/macOS 26 SDK + Swift 6.0 mode,
  # and local dev is Xcode 26.5 — macos-26 ships the matching Xcode 26 toolchain.
  swift-build:
    runs-on: macos-26
    # Cold xcframework = 9 Rust Apple slices (cross-compiled) + UniFFI bindgen +
    # the SwiftUI app compile. First run with a cold rust-cache can approach
    # ~20-25m; warm runs are far faster. 40m is comfortable headroom.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      # Rust toolchain pinned to rust/rust-toolchain.toml (1.96.0). All 9 Apple
      # targets are Tier 2 on stable 1.96 (visionOS/watchOS promoted in 1.95.0),
      # so `rustup target add` works with no nightly / -Z build-std.
      - name: Install Rust toolchain + Apple targets
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          # build-xcframework.sh `ensure_targets` HARD-dies on any missing target
          # (it does not run `rustup target add` itself), so add all 9 here.
          targets: >-
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-visionos,aarch64-apple-visionos-sim,aarch64-apple-watchos,aarch64-apple-watchos-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # xcodegen is NOT preinstalled on the runner; scripts/ios.sh `cmd_gen` hard-
      # dies (`require xcodegen`) without it. xcbeautify is optional (falls back to
      # cat), so we skip it to keep the job lean.
      - name: Install xcodegen
        run: brew install xcodegen
      # Compile only. ensure_xcframework (builds the 9-slice xcframework + UniFFI
      # bindings from scratch — neither TP_SKIP_RUST nor TP_FORCE_RUST set) →
      # ensure_project (xcodegen generate) → xcodebuild -destination platform=macOS.
      # TP_SKIP_ARM64_32=1: the arm64_32-apple-watchos slice (tier-3, nightly
      # -Zbuild-std) is only needed for a watchOS DEVICE archive. Smoke/compile
      # CI links the xcframework against a Simulator destination, so arm64-only
      # watchOS device is fine here. The iOS TestFlight job (which embeds the watch
      # companion and DOES archive for device, #123) does NOT set this — it needs
      # the full arm64_32 slice, and it forces a fresh xcframework rebuild
      # (TP_FORCE_RUST=1) precisely so this 6-slice cache can't poison its archive.
      - name: Build Swift app (native macOS, compile only)
        run: TP_PLATFORM=macos TP_SKIP_ARM64_32=1 scripts/ios.sh build

  # Deterministic iOS Simulator smoke E2E (B4 follow-up). Where `swift-build`
  # proves the app COMPILES, this proves it actually RUNS the full wire/E2EE path:
  # it boots a headless iOS Simulator, starts the in-process loopback relay +
  # fake scripted daemon (`scripts/local-relay-loopback.ts` — NO real `tp` daemon,
  # NO `claude`), launches the app with a golden `--tp-smoke-url` pairing link, and
  # polls the unified log for all 8 boot markers (TP_BOOT_OK → TP_INPUT_OK). The
  # fake daemon byte-echoes the app's input probe, so the M5 input round-trip is
  # deterministic without a PTY. This is fully reproducible and credential-free —
  # the real-claude E2E modes (TP_E2E_CLAUDE*) stay LOCAL-only (native-testing.md).
  #
  # NOT a required check (ci-workflows.md): added non-required so a flaky Simulator
  # boot / runner drift never wedges unrelated PRs. Promote to required only after
  # it is reliably green on main. simctl is headless-by-design (no GUI session
  # needed), which is why the iOS Simulator path — not the macOS `open` path — is
  # the CI-appropriate smoke surface.
  #
  # Runner PINNED to macos-26 (same rationale as swift-build): iOS/macOS 26 SDK +
  # Swift 6.0, matching local Xcode 26.5. `sim_udid` resolves $TP_SIM with a
  # fallback to any available iPhone on the newest iOS runtime, so this stays green
  # even if the runner's preinstalled device lineup drifts from "iPhone 17 Pro".
  swift-smoke-ios:
    runs-on: macos-26
    # Same cold-xcframework cost as swift-build (the 7-slice xcframework build
    # dominates; the Simulator boot + smoke poll add < ~2m). 40m headroom.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      # Backend deps (bun) for the loopback relay script. The setup action installs
      # Node + Bun + pnpm and runs `pnpm install` so @teleprompter/* resolve.
      - uses: ./.github/actions/setup
      - name: Install Rust toolchain + Apple targets
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          # build-xcframework.sh ensure_targets HARD-dies on any missing target,
          # so add all 9 even though the iOS smoke only links the 2 iOS-sim slices.
          targets: >-
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-visionos,aarch64-apple-visionos-sim,aarch64-apple-watchos,aarch64-apple-watchos-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install xcodegen
        run: brew install xcodegen
      # Full loopback smoke: rust→gen→build→install→launch→poll 8 markers. No
      # TP_SKIP_RUST (build the xcframework fresh, warmed by rust-cache across runs).
      # TP_SIM names a likely-present device; sim_udid falls back if it is absent.
      # TP_SKIP_ARM64_32=1: arm64_32-apple-watchos (tier-3, nightly -Zbuild-std) is
      # only required for a watchOS device archive; the iOS Simulator smoke only
      # links the ios-sim slices, so arm64-only watchOS device is fine here.
      - name: iOS Simulator smoke (8-marker loopback E2E)
        run: TP_PLATFORM=ios TP_SIM="iPhone 17 Pro" TP_SKIP_ARM64_32=1 scripts/ios.sh smoke
