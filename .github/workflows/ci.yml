name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint & format check
        run: npx biome ci .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check
        run: |
          npx tsc --noEmit -p packages/daemon/tsconfig.json
          npx tsc --noEmit -p apps/cli/tsconfig.json
          npx tsc --noEmit -p packages/relay/tsconfig.json
          npx tsc --noEmit -p packages/runner/tsconfig.json
          cd apps/app && npx tsc --noEmit && cd ../..

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test with coverage
        run: bun test --coverage packages/protocol packages/daemon packages/runner apps/cli packages/relay

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: bun run scripts/build.ts
      - name: Smoke test
        run: |
          ./dist/tp version
          ./dist/tp --help

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Expo web build
        id: expo-cache
        uses: actions/cache@v4
        with:
          path: |
            apps/app/dist
            apps/app/node_modules/.cache
          key: expo-web-${{ runner.os }}-${{ hashFiles('apps/app/**/*.ts', 'apps/app/**/*.tsx', 'apps/app/app.json', 'pnpm-lock.yaml') }}

      - name: Build web frontend
        if: steps.expo-cache.outputs.cache-hit != 'true'
        run: cd apps/app && npx expo export --platform web

      - name: Install Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright deps
        run: npx playwright install-deps chromium

      - name: Playwright E2E
        run: npx playwright test --project=ci

  eas-gate:
    needs: [lint, type-check, test, build-cli, e2e]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect app/protocol changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'packages/protocol/**'

      - uses: oven-sh/setup-bun@v2
        if: steps.changes.outputs.app == 'true'
        with:
          bun-version: "1.3.6"
      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.app == 'true'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.app == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.app == 'true'

      - name: Expo Doctor
        if: steps.changes.outputs.app == 'true'
        run: cd apps/app && npx expo doctor

      - name: Trigger EAS Build
        if: steps.changes.outputs.app == 'true' && vars.EXPO_TOKEN != ''
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: cd apps/app && npx eas-cli build --platform all --profile preview --non-interactive
