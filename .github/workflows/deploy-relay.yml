name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "packages/relay/**"
      - "packages/protocol/**"
      - "packages/daemon/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

env:
  RELAY_HOST: ${{ secrets.RELAY_HOST }}
  RELAY_PORT: "7090"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RELAY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${RELAY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Detect server arch
        id: arch
        run: |
          ARCH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST} "uname -m")
          case "$ARCH" in
            aarch64|arm64) echo "target=bun-linux-arm64" >> $GITHUB_OUTPUT ;;
            x86_64|amd64)  echo "target=bun-linux-x64" >> $GITHUB_OUTPUT ;;
          esac
          echo "Server arch: $ARCH"

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Compile tp binary
        run: |
          bun build apps/cli/src/index.ts --compile --target=${{ steps.arch.outputs.target }} \
            --define "process.env.TP_BUILD_SHA=\"${{ github.sha }}\"" \
            --define "process.env.TP_BUILD_TIME=\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" \
            --outfile /tmp/tp

      - name: Deploy to server
        run: |
          SSH="ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST}"
          SCP_DEST="${{ secrets.RELAY_USER }}@${RELAY_HOST}"
          LOCAL_SHA=$(sha256sum /tmp/tp | cut -d' ' -f1)
          echo "built tp sha256=$LOCAL_SHA"

          # Build the canonical systemd unit locally (no nested heredoc/indent
          # hazards) and ship it as a file. Mirrors scripts/deploy-relay.sh.
          cat > /tmp/tp-relay.service <<UNIT
          [Unit]
          Description=Teleprompter Relay Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/tp relay start
          Environment=RELAY_PORT=${RELAY_PORT}
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          UNIT
          echo "===== unit to be installed ====="
          cat /tmp/tp-relay.service

          scp -o StrictHostKeyChecking=no /tmp/tp "$SCP_DEST:/tmp/tp"
          scp -o StrictHostKeyChecking=no /tmp/tp-relay.service "$SCP_DEST:/tmp/tp-relay.service"

          # Install binary, converge the unit (the host had drifted: its ExecStart
          # ran a SEPARATE /usr/local/bin/tp-relay that deploy never updated, so 25
          # "successful" deploys kept refreshing /usr/local/bin/tp while the service
          # ran a 3-day-stale binary), reload + restart.
          $SSH 'set -e
            sudo mv /tmp/tp /usr/local/bin/tp
            sudo chmod +x /usr/local/bin/tp
            sudo mv /tmp/tp-relay.service /etc/systemd/system/tp-relay.service
            sudo systemctl daemon-reload
            sudo systemctl enable tp-relay
            sudo systemctl restart tp-relay'

          # On-disk verification: the binary the (now-canonical) unit runs must be
          # the one we just built.
          REMOTE_SHA=$($SSH 'sha256sum /usr/local/bin/tp | cut -d" " -f1')
          echo "on-disk /usr/local/bin/tp sha256=$REMOTE_SHA"
          if [ "$REMOTE_SHA" != "$LOCAL_SHA" ]; then
            echo "::error::on-disk /usr/local/bin/tp sha=$REMOTE_SHA != built sha=$LOCAL_SHA — sudo mv did not take."
            exit 1
          fi
          echo "service now executes: $($SSH 'systemctl show tp-relay -p MainPID --value | xargs -I{} readlink -f /proc/{}/exe')"

      - name: Verify deployed build is live
        run: |
          sleep 3
          HEALTH=$(curl -sf "https://relay.tpmt.dev/health")
          echo "$HEALTH" | jq .
          STATUS=$(echo "$HEALTH" | jq -r '.status')
          LIVE_SHA=$(echo "$HEALTH" | jq -r '.buildSha')
          if [ "$STATUS" != "ok" ]; then
            echo "::error::relay /health status=$STATUS (expected ok)"
            exit 1
          fi
          if [ "$LIVE_SHA" != "${{ github.sha }}" ]; then
            echo "::error::relay is running a STALE binary: /health buildSha=$LIVE_SHA but deployed ${{ github.sha }}. The systemd service (tp-relay) did not pick up the new /usr/local/bin/tp — check ExecStart path and that the restart succeeded."
            exit 1
          fi
          echo "Verified: relay is running the freshly-deployed build ${LIVE_SHA}"
