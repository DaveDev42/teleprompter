name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "packages/relay/**"
      - "packages/protocol/**"
      - "packages/daemon/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

env:
  RELAY_HOST: ${{ secrets.RELAY_HOST }}
  RELAY_PORT: "7090"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RELAY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${RELAY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Detect server arch
        id: arch
        run: |
          ARCH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST} "uname -m")
          case "$ARCH" in
            aarch64|arm64) echo "target=bun-linux-arm64" >> $GITHUB_OUTPUT ;;
            x86_64|amd64)  echo "target=bun-linux-x64" >> $GITHUB_OUTPUT ;;
          esac
          echo "Server arch: $ARCH"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - name: Compile tp binary
        run: |
          bun build apps/cli/src/index.ts --compile --target=${{ steps.arch.outputs.target }} --outfile /tmp/tp

      - name: Deploy to server
        run: |
          scp -o StrictHostKeyChecking=no /tmp/tp ${{ secrets.RELAY_USER }}@${RELAY_HOST}:/tmp/tp
          ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST} "sudo mv /tmp/tp /usr/local/bin/tp && sudo chmod +x /usr/local/bin/tp && sudo systemctl restart tp-relay"

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -sf "https://relay.tpmt.dev/health" | jq -r '.status')
          echo "Health: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Summary
        run: |
          echo "Relay deployed to relay.tpmt.dev"
          curl -sf "https://relay.tpmt.dev/health" | jq .
