name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "packages/relay/**"
      - "packages/protocol/**"
      - "packages/daemon/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

env:
  RELAY_HOST: ${{ secrets.RELAY_HOST }}
  RELAY_PORT: "7090"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RELAY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${RELAY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Detect server arch
        id: arch
        run: |
          ARCH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST} "uname -m")
          case "$ARCH" in
            aarch64|arm64) echo "target=bun-linux-arm64" >> $GITHUB_OUTPUT ;;
            x86_64|amd64)  echo "target=bun-linux-x64" >> $GITHUB_OUTPUT ;;
          esac
          echo "Server arch: $ARCH"

      - name: Diagnose host (pre-deploy)
        run: |
          SSH="ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST}"
          echo "===== whoami / sudo ====="
          $SSH 'whoami; id' || true
          $SSH 'sudo -n true && echo "passwordless-sudo: YES" || echo "passwordless-sudo: NO"' || true
          echo "===== current /usr/local/bin/tp ====="
          $SSH 'ls -la /usr/local/bin/tp; readlink -f /usr/local/bin/tp; stat -c "mtime=%y size=%s" /usr/local/bin/tp 2>/dev/null' || true
          echo "===== which tp (PATH resolution the service might use) ====="
          $SSH 'which -a tp; command -v tp' || true
          echo "===== systemd unit (the authoritative ExecStart) ====="
          $SSH 'systemctl cat tp-relay 2>/dev/null || sudo systemctl cat tp-relay 2>/dev/null' || true
          echo "===== running process — which binary is actually executing? ====="
          $SSH 'systemctl show tp-relay -p MainPID --value 2>/dev/null | xargs -I{} sh -c "ls -la /proc/{}/exe 2>/dev/null; readlink -f /proc/{}/exe 2>/dev/null"' || true
          $SSH 'pgrep -af "tp relay" || pgrep -af "relay start"' || true
          echo "===== other tp binaries on disk (stale copies the service might run) ====="
          $SSH 'ls -la /usr/local/bin/tp /usr/bin/tp /opt/tp/tp /root/tp 2>/dev/null; find / -maxdepth 4 -name tp -type f 2>/dev/null | head' || true

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Compile tp binary
        run: |
          bun build apps/cli/src/index.ts --compile --target=${{ steps.arch.outputs.target }} \
            --define "process.env.TP_BUILD_SHA=\"${{ github.sha }}\"" \
            --define "process.env.TP_BUILD_TIME=\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" \
            --outfile /tmp/tp

      - name: Deploy to server
        run: |
          SSH="ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST}"
          # Local sha of the freshly-built binary, for an on-disk comparison after mv.
          LOCAL_SHA=$(sha256sum /tmp/tp | cut -d' ' -f1)
          echo "built tp sha256=$LOCAL_SHA"
          scp -o StrictHostKeyChecking=no /tmp/tp ${{ secrets.RELAY_USER }}@${RELAY_HOST}:/tmp/tp
          echo "===== uploaded /tmp/tp sha on host ====="
          $SSH 'sha256sum /tmp/tp'
          echo "===== mv + chmod + restart (with -x trace + explicit exit codes) ====="
          $SSH 'set -x; sudo mv /tmp/tp /usr/local/bin/tp; echo "mv rc=$?"; sudo chmod +x /usr/local/bin/tp; echo "chmod rc=$?"; sudo systemctl restart tp-relay; echo "restart rc=$?"'
          echo "===== POST-mv: on-disk /usr/local/bin/tp sha (must equal $LOCAL_SHA) ====="
          REMOTE_SHA=$($SSH 'sha256sum /usr/local/bin/tp | cut -d" " -f1')
          echo "on-disk /usr/local/bin/tp sha256=$REMOTE_SHA"
          if [ "$REMOTE_SHA" != "$LOCAL_SHA" ]; then
            echo "::error::mv did NOT replace /usr/local/bin/tp — on-disk sha=$REMOTE_SHA != built sha=$LOCAL_SHA. The sudo mv silently failed or the service binary lives elsewhere."
            exit 1
          fi
          echo "on-disk binary matches freshly-built binary."
          echo "===== which binary is the service now running? ====="
          $SSH 'systemctl show tp-relay -p MainPID --value | xargs -I{} readlink -f /proc/{}/exe' || true

      - name: Verify deployed build is live
        run: |
          sleep 3
          HEALTH=$(curl -sf "https://relay.tpmt.dev/health")
          echo "$HEALTH" | jq .
          STATUS=$(echo "$HEALTH" | jq -r '.status')
          LIVE_SHA=$(echo "$HEALTH" | jq -r '.buildSha')
          if [ "$STATUS" != "ok" ]; then
            echo "::error::relay /health status=$STATUS (expected ok)"
            exit 1
          fi
          if [ "$LIVE_SHA" != "${{ github.sha }}" ]; then
            echo "::error::relay is running a STALE binary: /health buildSha=$LIVE_SHA but deployed ${{ github.sha }}. The systemd service (tp-relay) did not pick up the new /usr/local/bin/tp — check ExecStart path and that the restart succeeded."
            exit 1
          fi
          echo "Verified: relay is running the freshly-deployed build ${LIVE_SHA}"
