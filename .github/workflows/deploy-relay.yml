name: Deploy Relay

on:
  push:
    branches: [main]
    paths:
      - "packages/relay/**"
      - "packages/protocol/**"
      - "packages/daemon/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to deploy (e.g. v0.1.5), or 'build' to build from source"
        required: false
        default: "build"
  release:
    types: [published]

env:
  RELAY_HOST: ${{ secrets.RELAY_HOST }}
  RELAY_PORT: "7090"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: env.RELAY_HOST != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RELAY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${RELAY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Detect server arch
        id: arch
        run: |
          ARCH=$(ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST} "uname -m")
          case "$ARCH" in
            aarch64|arm64) echo "target=bun-linux-arm64" >> $GITHUB_OUTPUT ;;
            x86_64|amd64)  echo "target=bun-linux-x64" >> $GITHUB_OUTPUT ;;
          esac
          echo "Server arch: $ARCH"

      - name: Build from source
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version == 'build')
        uses: oven-sh/setup-bun@v2
      - name: Compile relay binary
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version == 'build')
        run: |
          bun build packages/relay/src/index.ts --compile --target=${{ steps.arch.outputs.target }} --outfile /tmp/tp-relay

      - name: Download from release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.version != 'build')
        run: |
          if [ "${{ github.event.inputs.version }}" = "latest" ] || [ -z "${{ github.event.inputs.version }}" ]; then
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q '.tagName')
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "Deploying $TAG"

          case "${{ steps.arch.outputs.target }}" in
            bun-linux-arm64) ASSET="tp-relay-linux_arm64" ;;
            bun-linux-x64)   ASSET="tp-relay-linux_x64" ;;
          esac

          gh release download "$TAG" --repo ${{ github.repository }} --pattern "$ASSET" --dir /tmp
          mv "/tmp/$ASSET" /tmp/tp-relay
          chmod +x /tmp/tp-relay
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to server
        run: |
          scp -o StrictHostKeyChecking=no /tmp/tp-relay ${{ secrets.RELAY_USER }}@${RELAY_HOST}:/usr/local/bin/tp-relay
          ssh -o StrictHostKeyChecking=no ${{ secrets.RELAY_USER }}@${RELAY_HOST} "systemctl restart tp-relay"

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -sf "http://${RELAY_HOST}:${RELAY_PORT}/health" | jq -r '.status')
          echo "Health: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1

      - name: Summary
        run: |
          echo "Relay deployed to ${RELAY_HOST}:${RELAY_PORT}"
          curl -sf "http://${RELAY_HOST}:${RELAY_PORT}/health" | jq .
