name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [bun-darwin-arm64, bun-darwin-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: |
          SUFFIX=$(echo "${{ matrix.target }}" | sed 's/bun-//' | sed 's/-/_/')
          bun build apps/cli/src/index.ts --compile --target=${{ matrix.target }} --outfile dist/tp-${SUFFIX}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [bun-linux-x64, bun-linux-arm64, bun-windows-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: |
          SUFFIX=$(echo "${{ matrix.target }}" | sed -e 's/bun-//' -e 's/-/_/')
          EXT=""
          case "${{ matrix.target }}" in *windows*) EXT=".exe" ;; esac
          bun build apps/cli/src/index.ts --compile --target=${{ matrix.target }} --outfile dist/tp-${SUFFIX}${EXT}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  release:
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tp-* > checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tp-*
            artifacts/checksums.txt
          generate_release_notes: true
