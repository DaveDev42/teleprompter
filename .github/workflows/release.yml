name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.19)"
        required: true

permissions:
  contents: write
  id-token: write        # cosign keyless OIDC
  attestations: write    # actions/attest-build-provenance
  actions: write         # CD: dispatch testflight.yml after a successful release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Rust-only bundles (#5 PR6): scripts/build-bundle.sh builds the 4 cargo bins
  # and packs bin/tp + libexec/tp/{tp-daemon,tp-relay,tp-runner,tpd-stub} into
  # dist/tp-<suffix>.tar.gz — the ONLY release asset shape. The legacy Bun
  # single-binary asset (tp-<suffix>, no .tar.gz) is DROPPED: pre-tarball
  # `tp upgrade` clients (ancient Bun-CLI installs) can no longer self-update
  # and must reinstall via install.sh/brew. The tpd member is a tiny sh STUB
  # kept only so pre-PR6 upgrade.rs unpack checks and old install.sh revisions
  # (both hard-require the member) keep working — rationale in build-bundle.sh.
  #
  # NOTE: dispatching this workflow (which lives on main) against a tag cut
  # BEFORE PR6 would fail — those trees lack scripts/build-bundle.sh. Same
  # already-documented constraint as testflight.yml: we never re-release
  # pre-cutover tags with the current workflow.
  #
  # No codesigning on darwin: cargo's darwin output carries a linker-signed
  # ad-hoc signature and tar preserves the bytes; brew/curl install paths don't
  # apply the com.apple.quarantine xattr, so Gatekeeper never fires on our
  # distribution channels.
  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # aarch64-apple-darwin is already the host target on the arm64 runner;
      # rustup target add is a no-op but harmless and ensures the target is listed.
      - run: rustup target add aarch64-apple-darwin
      - name: Build bundle tarball (Rust-only)
        run: scripts/build-bundle.sh darwin_arm64 aarch64-apple-darwin
      - uses: actions/upload-artifact@v7
        with:
          name: binary-darwin_arm64
          path: dist/tp-*.tar.gz

  # UPX note: the tarball contains FOUR Rust binaries, so gzip already provides
  # asset-level compression; per-binary UPX inside the bundle is deferred.
  build-linux:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux_x64
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
          - suffix: linux_arm64
            runner: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Each linux target builds on its native runner — no cross-linker needed.
      - run: rustup target add ${{ matrix.rust-target }}
      - name: Build bundle tarball (Rust-only)
        run: scripts/build-bundle.sh ${{ matrix.suffix }} ${{ matrix.rust-target }}
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.suffix }}
          path: dist/tp-*.tar.gz

  release:
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      # Hard gate: every bundle tarball must contain the exact member set that
      # upgrade.rs / install.sh / the brew formula consume. Catches a broken
      # build-bundle.sh before anything is published.
      - name: Verify bundle tarball members
        run: |
          set -euo pipefail
          cd artifacts
          for f in tp-*.tar.gz; do
            echo "== $f"
            tar -tzf "$f"
            suffix="${f#tp-}"; suffix="${suffix%.tar.gz}"
            for member in bin/tp libexec/tp/tpd libexec/tp/tp-daemon libexec/tp/tp-relay libexec/tp/tp-runner; do
              tar -tzf "$f" | grep -qx "tp-${suffix}/${member}" || {
                echo "missing member: tp-${suffix}/${member}" >&2
                exit 1
              }
            done
          done
      - uses: sigstore/cosign-installer@v3
      - name: Generate checksums
        run: |
          cd artifacts
          # checksums cover the bundle tarballs (tp-*.tar.gz) — the only asset
          # shape since PR6 (#5). upgrade.rs and brew/install.sh all verify
          # against the tarball checksum here.
          sha256sum tp-* > checksums.txt
          cat checksums.txt
      - name: Sign checksums with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          cosign sign-blob \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt
          ls -la checksums.txt*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          # Attest the bundle tarballs (the only release assets since PR6).
          subject-path: "artifacts/tp-*"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/tp-*
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
            artifacts/checksums.txt.pem

  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: DaveDev42/homebrew-tap-release@v1
        with:
          formula-name: tp
          version: ${{ inputs.tag || github.ref_name }}
          # Point brew at the bundle tarball — the action downloads this URL to
          # compute sha256 and rewrites url+sha256+version in the formula.
          # The formula's `def install` block (libexec prefix-tree layout) is set
          # once manually in the tap repo and persists across bumps.
          download-url: https://github.com/DaveDev42/teleprompter/releases/download/${{ inputs.tag || github.ref_name }}/tp-darwin_arm64.tar.gz
          tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # CD: once the CLI release + tap bump succeed, kick off the 5-platform
  # TestFlight upload for the SAME tag. This is the continuous-deployment hook
  # — after the first manual TestFlight, every release auto-deploys to ASC.
  #
  # WHY a separate dispatched run (not a job here, not a workflow_run trigger):
  #   - Isolation: a TestFlight signing/upload failure must never red the CLI
  #     release that already published binaries + bumped the tap.
  #   - #172-safe: we pass the tag EXPLICITLY via -f tag and --ref, so the
  #     dispatched run never relies on a push event that GitHub may drop.
  #   - workflow_run is unusable here: release.yml is operated via
  #     workflow_dispatch, and a downstream workflow_run payload cannot recover
  #     the dispatch `tag` input (head_branch=main, not the tag) — so it could
  #     not know which ref to build.
  #
  # GITHUB_TOKEN CAN trigger this: workflow_dispatch is an explicit exception to
  # the "GITHUB_TOKEN events don't create runs" recursion guard (official docs:
  # "workflow_dispatch and repository_dispatch events always create workflow
  # runs"). Requires only `actions: write` (declared above).
  #
  # CONSTRAINT (load-bearing): `gh workflow run --ref <tag>` resolves
  # testflight.yml from the TAG's tree, not main. testflight.yml is already on
  # main, so every tag cut from here forward contains it. Re-releasing a tag
  # created BEFORE testflight.yml existed would fail this dispatch — we never do
  # that (CD only fires on tags >= current main; the first upload is manual).
  testflight:
    needs: [release, bump-tap]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch TestFlight for ${{ inputs.tag || github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh workflow run testflight.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$TAG" \
            -f tag="$TAG"
          echo "✅ dispatched testflight.yml for $TAG (separate run; failures isolated from this release)"
