name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.19)"
        required: true

permissions:
  contents: write
  id-token: write        # cosign keyless OIDC
  attestations: write    # actions/attest-build-provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-darwin-arm64, bun-darwin-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: bun run scripts/build.ts --target ${{ matrix.target }}
      - name: Ad-hoc codesign (macOS)
        # Bun embeds a native ad-hoc signature on `--compile` output when the
        # target arch matches the host (arm64 runner → arm64 target), which
        # makes `codesign --sign -` choke with "invalid or unsupported format
        # for signature". Strip the existing signature first, then re-sign.
        run: |
          for f in dist/tp-*; do
            if [ -f "$f" ]; then
              codesign --remove-signature "$f" || true
              codesign --sign - --force --options runtime --timestamp=none "$f"
              codesign --verify --verbose "$f"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  build-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-linux-x64, bun-linux-arm64, bun-windows-x64, bun-windows-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: bun run scripts/build.ts --target ${{ matrix.target }}
      # UPX compression for Linux/Windows x64: ~55% size reduction at the cost
      # of a one-time decompression at startup (<200ms). Measured on the CI
      # runner: linux-x64 102MB → 46MB, windows-x64 117MB → 55MB.
      #
      # Excluded platforms:
      # - Darwin (any arch): macOS Gatekeeper SIGKILLs UPX-packed Mach-O
      #   regardless of ad-hoc codesigning.
      # - windows-arm64: UPX (as of 4.2.2) does not yet support win64/arm64
      #   and returns CantPackException. Ship uncompressed.
      - name: Install UPX
        if: matrix.target != 'bun-windows-arm64'
        run: sudo apt-get update && sudo apt-get install -y upx-ucl
      - name: Compress binary with UPX
        if: matrix.target != 'bun-windows-arm64'
        run: |
          for f in dist/tp-*; do
            if [ -f "$f" ]; then
              echo "Compressing $f..."
              upx -1 "$f"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  release:
    needs: [build-darwin, build-cross]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Verify macOS signatures (best-effort)
        run: |
          cd artifacts
          for f in tp-darwin_*; do
            file "$f" || true
          done
      - uses: sigstore/cosign-installer@v3
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tp-* > checksums.txt
          cat checksums.txt
      - name: Sign checksums with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          cosign sign-blob \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt
          ls -la checksums.txt*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "artifacts/tp-*"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/tp-*
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
            artifacts/checksums.txt.pem
          generate_release_notes: true
