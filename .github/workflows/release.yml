name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write        # cosign keyless OIDC
  attestations: write    # actions/attest-build-provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-darwin-arm64, bun-darwin-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: bun run scripts/build.ts --target ${{ matrix.target }}
      - name: Ad-hoc codesign (macOS)
        # Bun embeds a native ad-hoc signature on `--compile` output when the
        # target arch matches the host (arm64 runner → arm64 target), which
        # makes `codesign --sign -` choke with "invalid or unsupported format
        # for signature". Strip the existing signature first, then re-sign.
        run: |
          for f in dist/tp-*; do
            if [ -f "$f" ]; then
              codesign --remove-signature "$f" || true
              codesign --sign - --force --options runtime --timestamp=none "$f"
              codesign --verify --verbose "$f"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  build-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-linux-x64, bun-linux-arm64, bun-windows-x64, bun-windows-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: bun run scripts/build.ts --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  release:
    needs: [build-darwin, build-cross]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Verify macOS signatures (best-effort)
        run: |
          cd artifacts
          for f in tp-darwin_*; do
            file "$f" || true
          done
      - uses: sigstore/cosign-installer@v3
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tp-* > checksums.txt
          cat checksums.txt
      - name: Sign checksums with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          cosign sign-blob \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt
          ls -la checksums.txt*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "artifacts/tp-*"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tp-*
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
            artifacts/checksums.txt.pem
          generate_release_notes: true
