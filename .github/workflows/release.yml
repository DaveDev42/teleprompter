name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.1.19)"
        required: true

permissions:
  contents: write
  id-token: write        # cosign keyless OIDC
  attestations: write    # actions/attest-build-provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-darwin-arm64, bun-darwin-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: bun run scripts/build.ts --target ${{ matrix.target }}
      - name: Ad-hoc codesign (macOS)
        # Bun embeds a native ad-hoc signature on `--compile` output when the
        # target arch matches the host (arm64 runner → arm64 target), which
        # makes `codesign --sign -` choke with "invalid or unsupported format
        # for signature". Strip the existing signature first, then re-sign.
        run: |
          for f in dist/tp-*; do
            if [ -f "$f" ]; then
              codesign --remove-signature "$f" || true
              codesign --sign - --force --options runtime --timestamp=none "$f"
              codesign --verify --verbose "$f"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  build-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [bun-linux-x64, bun-linux-arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: bun run scripts/build.ts --target ${{ matrix.target }}
      # UPX compression for Linux: ~55% size reduction at the cost of a
      # one-time decompression at startup (<200ms). Measured on the CI
      # runner: linux-x64 102MB → 46MB.
      #
      # Darwin (any arch) is excluded: macOS Gatekeeper SIGKILLs UPX-packed
      # Mach-O regardless of ad-hoc codesigning.
      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl
      - name: Compress binary with UPX
        run: |
          for f in dist/tp-*; do
            if [ -f "$f" ]; then
              echo "Compressing $f..."
              upx -1 "$f"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/tp-*

  release:
    needs: [build-darwin, build-cross]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Verify macOS signatures (best-effort)
        run: |
          cd artifacts
          for f in tp-darwin_*; do
            file "$f" || true
          done
      - uses: sigstore/cosign-installer@v3
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum tp-* > checksums.txt
          cat checksums.txt
      - name: Sign checksums with cosign (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cd artifacts
          cosign sign-blob \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt
          ls -la checksums.txt*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "artifacts/tp-*"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/tp-*
            artifacts/checksums.txt
            artifacts/checksums.txt.sig
            artifacts/checksums.txt.pem

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set, skipping formula update"
            exit 0
          fi

          VERSION="${TAG#v}"
          export VERSION
          export SHA_DARWIN_ARM64=$(grep -m1 ' tp-darwin_arm64$' artifacts/checksums.txt | awk '{print $1}')
          export SHA_DARWIN_X64=$(grep -m1 ' tp-darwin_x64$' artifacts/checksums.txt | awk '{print $1}')

          for var in SHA_DARWIN_ARM64 SHA_DARWIN_X64; do
            if [ -z "${!var}" ]; then
              echo "::error::Failed to extract checksum for ${var}"
              exit 1
            fi
          done

          # Single-quoted heredoc preserves Ruby #{version}/#{bin},
          # envsubst replaces only the listed shell variables
          cat <<'FORMULA' | envsubst '$VERSION $SHA_DARWIN_ARM64 $SHA_DARWIN_X64' > /tmp/tp.rb
          class Tp < Formula
            desc "Remote Claude Code session controller"
            homepage "https://github.com/DaveDev42/teleprompter"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/DaveDev42/teleprompter/releases/download/v#{version}/tp-darwin_arm64"
                sha256 "$SHA_DARWIN_ARM64"
              else
                url "https://github.com/DaveDev42/teleprompter/releases/download/v#{version}/tp-darwin_x64"
                sha256 "$SHA_DARWIN_X64"
              end
            end

            def install
              binary = Dir["tp-darwin_*"].first
              bin.install binary => "tp"
              generate_completions_from_executable(bin/"tp", "completions", shells: [:bash, :zsh, :fish])
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tp version")
            end
          end
          FORMULA

          git clone --branch main --single-branch https://github.com/DaveDev42/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/DaveDev42/homebrew-tap.git"
          mkdir -p Formula
          cp /tmp/tp.rb Formula/tp.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tp.rb
          if git diff --cached --quiet; then
            echo "Formula already up-to-date for ${VERSION}, skipping commit"
            exit 0
          fi
          git commit -m "chore: update tp to ${VERSION}"
          git push || echo "::warning::Homebrew tap push failed (non-fatal)"
          generate_release_notes: true
