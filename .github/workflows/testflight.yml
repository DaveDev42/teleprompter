# TestFlight deployment — Apple multiplatform SwiftUI app, all 5 platforms:
# iOS + iPadOS + macOS + visionOS + watchOS (ADR-0004 §7 Amendment 1 + 2).
#
# watchOS is NOT a separate upload job: the watch app is a COMPANION embedded in
# the iOS app (#123, ADR-0004 Amendment 2), so it ships inside the iOS .ipa under
# Payload/Teleprompter.app/Watch/ and uploads on the single dev.tpmt.app record.
# The iOS job therefore builds the watchOS device slice (nightly Rust arm64_32 +
# downloadPlatform watchOS) and installs the embedded watch app's profile. The
# watch app keeps WKRunsIndependentlyOfCompanionApp=YES so it still runs standalone
# on Apple Watch away from the iPhone (companion DISTRIBUTION, standalone RUNTIME).
#
# Replaces the EAS Submit pipeline removed in the native rewrite (ADR-0001,
# amended by ADR-0004). EAS used to do "push a tag → cloud build → TestFlight";
# this restores that on GitHub-hosted macOS runners using only Apple's own tools
# (xcodebuild archive/export + xcrun altool), no third-party service.
#
# What it does: per platform (iOS, macOS, visionOS), import the platform's Apple
# Distribution cert + App Store provisioning profile(s) into a throwaway keychain,
# build+sign a Release archive (scripts/ios.sh archive, branched on TP_PLATFORM),
# export an App-Store artifact (iOS → .ipa with embedded watch, macOS → installer
# .pkg), and upload it to App Store Connect (→ TestFlight) with an ASC API key. The
# build number is the workflow run number so every upload is monotonic (App Store
# Connect rejects a re-used build number). Each platform has its own secret-gated
# guard job so an absent platform skips cleanly without wedging the others.
#
# Triggers: a `v*` tag push (rides the same tags release.yml uses) OR manual
# dispatch. Gated on secrets being present — see the `guard` job — so a fork or a
# secrets-less environment never fails; it just skips with a clear message.
name: TestFlight

# Trigger = workflow_dispatch ONLY. release.yml's `testflight` job dispatches this
# (gh workflow run testflight.yml --ref <tag> -f tag=<tag>) after a successful CLI
# release+tap bump (CD), and the first manual upload (Task #122) is also a dispatch.
# A `push: tags: [v*]` trigger was REMOVED (#125): with release.yml ALSO dispatching
# on the same tag, every release produced TWO complete runs with different build
# numbers — ASC accepted a duplicate TestFlight build per release AND it burned 2x
# the (paid) macos-26 archive jobs. Dispatch-only makes release.yml the single
# driver. (GitHub API tag-creation often fails to fire push events anyway, #172 —
# so the push trigger was unreliable on top of being duplicative.)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/ref to build (defaults to the triggering ref)"
        required: false

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cheap ubuntu gate: only proceed to the (slow, paid) macOS archive when the
  # signing + ASC secrets actually exist. Secrets are not available to `if:`
  # conditions on the job itself in a useful boolean form, so we surface presence
  # as an output here and depend on it.
  guard:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          # Every secret the upload path consumes EXCEPT IOS_DIST_CERT_PASSWORD,
          # which can legitimately be empty (a password-less .p12) — so it is
          # documented as required but not non-empty-checked here.
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          # The iOS .ipa embeds the companion watch app (#123), whose own bundle id
          # (dev.tpmt.app.watchkitapp) needs its own App Store profile to sign — so
          # the watch profile is now HARD-REQUIRED for the iOS upload.
          WATCH_PROFILE: ${{ secrets.IOS_WATCH_PROVISIONING_PROFILE_BASE64 }}
          ASC_KEY: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
          TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CERT" ] && [ -n "$PROFILE" ] && [ -n "$WATCH_PROFILE" ] \
             && [ -n "$ASC_KEY" ] && [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER" ] \
             && [ -n "$TEAM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TestFlight secrets not fully configured — skipping upload. Required: IOS_DIST_CERT_P12_BASE64, IOS_DIST_CERT_PASSWORD (may be empty), IOS_PROVISIONING_PROFILE_BASE64, IOS_WATCH_PROVISIONING_PROFILE_BASE64 (dev.tpmt.app.watchkitapp — embedded companion watch), ASC_API_KEY_P8_BASE64, ASC_API_KEY_ID, ASC_API_ISSUER_ID, APPLE_TEAM_ID."
          fi

  archive-and-upload:
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # The iOS .ipa now carries the COMPANION watch app embedded under
      # Payload/Teleprompter.app/Watch/ (#123, ADR-0004 Amendment 2), so the iOS
      # archive must build + sign the watchOS DEVICE slice too. That needs:
      #   (1) the arm64_32 watchOS Rust slice (older Apple Watches at our watchOS
      #       10.0 deploy target). arm64_32-apple-watchos is a Rust TIER-3 target
      #       with NO prebuilt std, so build-xcframework.sh builds it via the
      #       nightly toolchain + -Zbuild-std (rust-src component required) and
      #       lipo's it with the stable arm64 slice.
      #   (2) the watchOS platform support package (device support) — a separate
      #       downloadable component the macos-26 runner doesn't ship preinstalled.
      #
      # ORDER IS LOAD-BEARING: nightly is installed FIRST, the pinned 1.96.0 SECOND.
      # dtolnay/rust-toolchain runs `rustup default <toolchain>`, so the LAST action
      # wins the global default — we want 1.96.0 to be the default. build-xcframework.sh
      # additionally cd's into rust/ (so rust-toolchain.toml's 1.96.0 pin applies) and
      # invokes nightly by explicit `--toolchain nightly` only for the arm64_32 slice.
      - name: Install nightly Rust + rust-src (arm64_32 build-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install Rust toolchain + Apple targets (default)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: >-
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-visionos,aarch64-apple-visionos-sim,aarch64-apple-watchos,aarch64-apple-watchos-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install xcodegen
        run: brew install xcodegen

      # The embedded-watch device slice in the iOS archive needs watchOS platform
      # support; without it the archive fails "watchOS NN.N must be installed in
      # order to archive". Idempotent.
      - name: Download watchOS platform support
        run: xcodebuild -downloadPlatform watchOS

      # Import the Apple Distribution identity + BOTH provisioning profiles (the iOS
      # app AND the embedded companion watch app) into a dedicated, ephemeral
      # keychain (never the runner's default login keychain). Manual signing resolves
      # each bundle's profile from the keychain by bundle id, so the watch app
      # (dev.tpmt.app.watchkitapp) profile must be present alongside the iOS app
      # (dev.tpmt.app) profile or the embedded watch app fails to sign. The watch
      # profile reuses the same iOS Apple Distribution cert. The keychain + profiles
      # are removed in the always() cleanup step below.
      - name: Set up signing keychain
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          WATCH_PROFILE_BASE64: ${{ secrets.IOS_WATCH_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/tp-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          # Import the FULL PKCS#12 (cert + private key). Do NOT pass `-t cert` —
          # a .p12 is an aggregate and `-t cert` imports only the certificate item,
          # leaving the private key out, so codesign later finds "no identity". Apple's
          # own `man security` documents `-f pkcs12` with no type flag (or `-t agg`).
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN"
          # Allow codesign/xcodebuild to use the imported key without a UI prompt.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so signing resolves to it,
          # but keep the system keychain so Apple WWDR roots still validate.
          # The inner substitution intentionally word-splits: `-s` takes one
          # argument per keychain path, so the existing paths must expand into
          # separate argv entries (quoting would pass them as a single arg and
          # break the search list).
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          # Install BOTH profiles where Xcode looks for them (legacy + Xcode 16+).
          install_profile() {
            local b64="$1" tag="$2" path uuid
            path="$RUNNER_TEMP/profile-$tag.mobileprovision"
            echo "$b64" | base64 --decode > "$path"
            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$path")")"
            for DIR in \
              "$HOME/Library/MobileDevice/Provisioning Profiles" \
              "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
              mkdir -p "$DIR"
              cp "$path" "$DIR/$uuid.mobileprovision"
            done
            echo "installed $tag profile (UUID $uuid)"
          }
          install_profile "$PROFILE_BASE64" app
          install_profile "$WATCH_PROFILE_BASE64" watchapp

          echo "TP_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "✅ signing keychain + iOS app + embedded watch profiles ready"

      # Build + sign + export. cmd_archive needs only the Team ID and a build
      # number; signing is resolved from the keychain/profile installed above.
      # Build number = run_number*100 + run_attempt: monotonic across runs AND
      # unique per "Re-run failed jobs" attempt, so a re-run after a successful
      # upload never collides with App Store Connect's already-used CFBundleVersion
      # (ASC rejects a re-used build number). run_attempt starts at 1.
      - name: Archive + export App Store .ipa
        id: archive
        env:
          TP_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          # FORCE a fresh xcframework rebuild. Swatinem/rust-cache (workspaces: rust)
          # caches rust/target/, which is where TpCore.xcframework lives
          # (scripts/ios.sh:114). ci.yml's swift-build/swift-smoke jobs build with
          # TP_SKIP_ARM64_32=1 → a 6-slice xcframework whose watchOS-device slice is
          # arm64-ONLY (no arm64_32). If that stale cache is restored here,
          # ensure_xcframework() skips the rebuild (it only checks Info.plist
          # presence, not slice completeness — ios.sh:401/411), and the iOS DEVICE
          # archive — which embeds the watch and therefore needs the arm64_32 watch
          # slice — HARD-FAILS "missing architecture(s) required ... arm64_32" AFTER
          # the macos-26 runner is provisioned and the signing keychain is set up,
          # wasting paid minutes. TP_FORCE_RUST=1 rebuilds the full 7-slice (incl.
          # arm64_32 via nightly -Z build-std) xcframework, ignoring the poisoned cache.
          TP_FORCE_RUST: "1"
          # GitHub Actions expressions have NO arithmetic operators (* and + are
          # not in the operator table), so the run_number*100+run_attempt math is
          # done in the shell. run_number and run_attempt are plain integer
          # context lookups, safe to inject into a $(( )) arithmetic expansion.
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          export TP_BUILD_NUMBER=$(( RUN_NUMBER * 100 + RUN_ATTEMPT ))
          IPA="$(TP_PLATFORM=ios scripts/ios.sh archive)"
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      # Upload to App Store Connect (→ TestFlight) with an ASC API key (.p8).
      # altool reads the key from a well-known private_keys dir by key id.
      - name: Upload to TestFlight
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          IPA_PATH: ${{ steps.archive.outputs.ipa }}
        run: |
          set -euo pipefail
          KEYS_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$KEYS_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          # altool searches these dirs for AuthKey_<id>.p8.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEYS_DIR/AuthKey_${ASC_API_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
          echo "✅ uploaded $IPA_PATH to App Store Connect (TestFlight processing)"

      - name: Clean up signing keychain
        if: always()
        run: |
          if [ -n "${TP_KEYCHAIN:-}" ] && [ -f "$TP_KEYCHAIN" ]; then
            security delete-keychain "$TP_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/dist-cert.p12" \
                "$RUNNER_TEMP/profile-app.mobileprovision" \
                "$RUNNER_TEMP/profile-watchapp.mobileprovision" || true
          rm -rf "$RUNNER_TEMP/private_keys" "$HOME/.appstoreconnect/private_keys" || true
          # The installed provisioning profiles (copied to the two Provisioning
          # Profiles dirs by UUID) are harmless on an ephemeral hosted runner (whole
          # VM is discarded), but remove them so a reused/self-hosted runner never
          # accumulates stale signing material.
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision \
                "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision || true

  # ── macOS (Mac App Store TestFlight) ───────────────────────────────────────
  # ADR-0004 §7 Amendment 1. Same Apple-official pattern as the iOS job, but with
  # the Mac App Distribution identity + Mac App Store provisioning profile, a
  # macOS archive (TP_PLATFORM=macos → generic/platform=macOS → a signed .pkg),
  # and `altool --type macos`. Gated on macOS-specific cert/profile secrets plus
  # the shared ASC + team secrets, so it clean-skips when not configured.
  guard-macos:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          CERT: ${{ secrets.MAC_DIST_CERT_P12_BASE64 }}
          PROFILE: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}
          ASC_KEY: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
          TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CERT" ] && [ -n "$PROFILE" ] && [ -n "$ASC_KEY" ] \
             && [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER" ] && [ -n "$TEAM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::macOS TestFlight secrets not fully configured — skipping. Required: MAC_DIST_CERT_P12_BASE64, MAC_DIST_CERT_PASSWORD (may be empty), MAC_PROVISIONING_PROFILE_BASE64, ASC_API_KEY_P8_BASE64, ASC_API_KEY_ID, ASC_API_ISSUER_ID, APPLE_TEAM_ID. Optional: MAC_INSTALLER_CERT_P12_BASE64/PASSWORD (only if the installer identity is NOT bundled into MAC_DIST_CERT_P12_BASE64). See docs/testflight-setup.md §2."
          fi

  archive-and-upload-macos:
    needs: guard-macos
    if: needs.guard-macos.outputs.ready == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain + Apple targets
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: >-
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-visionos,aarch64-apple-visionos-sim,aarch64-apple-watchos,aarch64-apple-watchos-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install xcodegen
        run: brew install xcodegen

      # Import the Mac App Distribution identity (+ the separate Mac Installer
      # Distribution identity that signs the .pkg) + the Mac App Store provisioning
      # profile into a throwaway keychain.
      #
      # IMPORTANT — TWO distinct identities are needed for a Mac App Store upload:
      #   • "Apple Distribution" / "3rd Party Mac Developer Application" — signs the .app
      #   • "3rd Party Mac Developer Installer" — signs the .pkg productbuild output
      # On the Apple portal these are SEPARATE certificate types, so a normal
      # single-cert .p12 export does NOT contain the installer identity. We support
      # both layouts: either export BOTH certs into one combined .p12 (set only
      # MAC_DIST_CERT_P12_BASE64 — Keychain Access can multi-select and export both),
      # or keep them separate (also set MAC_INSTALLER_CERT_P12_BASE64). The optional
      # second import is a no-op when that secret is empty.
      #
      # macOS profiles use the .provisionprofile extension (not .mobileprovision).
      # Xcode 16+ reads profiles from ~/Library/Developer/Xcode/UserData/Provisioning
      # Profiles; older Xcode used ~/Library/MobileDevice/Provisioning Profiles — we
      # install into BOTH by UUID so the runner's Xcode version doesn't matter.
      - name: Set up signing keychain
        env:
          CERT_P12_BASE64: ${{ secrets.MAC_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MAC_DIST_CERT_PASSWORD }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.MAC_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.MAC_INSTALLER_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/tp-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.provisionprofile"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          # Import the application-signing .p12 (full aggregate — cert + private key;
          # no `-t cert`, which would drop the key). If the user exported both certs
          # into this one .p12, the installer identity comes in here too.
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN"
          # Optionally import a SEPARATE installer-distribution .p12 (no-op if unset).
          if [ -n "${INSTALLER_CERT_P12_BASE64:-}" ]; then
            INSTALLER_PATH="$RUNNER_TEMP/installer-cert.p12"
            echo "$INSTALLER_CERT_P12_BASE64" | base64 --decode > "$INSTALLER_PATH"
            security import "$INSTALLER_PATH" -P "${INSTALLER_CERT_PASSWORD:-}" -A -f pkcs12 -k "$KEYCHAIN"
            echo "imported separate Mac Installer Distribution identity"
          fi
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"
          for DIR in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$DIR"
            cp "$PROFILE_PATH" "$DIR/$UUID.provisionprofile"
          done

          echo "TP_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "✅ macOS signing keychain + profile ready (profile UUID $UUID)"

      - name: Archive + export Mac App Store .pkg
        id: archive
        env:
          TP_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          # The macOS archive uses ONLY the xcframework's macos-fat slice — it never
          # embeds the companion watch (that ships exclusively in the iOS .ipa, #123).
          # build-xcframework.sh nonetheless builds ALL platform slices, and the
          # watchOS-DEVICE slice's arm64_32 sub-slice is a Rust tier-3 target needing
          # the nightly toolchain + rust-src (-Zbuild-std). This job installs only the
          # stable 1.96.0 toolchain (no nightly/rust-src — unlike the iOS job, which
          # embeds the watch and therefore must), so without this flag the build dies
          # "nightly rust-src missing". TP_SKIP_ARM64_32=1 skips that one watch-device
          # sub-slice, which macOS does not need. (The iOS job keeps it — it needs it.)
          TP_SKIP_ARM64_32: "1"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          export TP_BUILD_NUMBER=$(( RUN_NUMBER * 100 + RUN_ATTEMPT ))
          PKG="$(TP_PLATFORM=macos scripts/ios.sh archive)"
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          PKG_PATH: ${{ steps.archive.outputs.pkg }}
        run: |
          set -euo pipefail
          KEYS_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$KEYS_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEYS_DIR/AuthKey_${ASC_API_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/"

          # macOS uploads a signed installer .pkg (not an .ipa). `--type macos` is a
          # valid altool type (man altool: macos|ios|appletvos|visionos). --upload-app
          # is documented as deprecated in favor of --upload-package, but still works
          # and is what the proven iOS job above uses — kept identical for consistency
          # (App Store *upload* altool was NOT removed; only its notarization role was).
          xcrun altool --upload-app \
            --type macos \
            --file "$PKG_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
          echo "✅ uploaded $PKG_PATH to App Store Connect (TestFlight processing)"

      - name: Clean up signing keychain
        if: always()
        run: |
          if [ -n "${TP_KEYCHAIN:-}" ] && [ -f "$TP_KEYCHAIN" ]; then
            security delete-keychain "$TP_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/dist-cert.p12" "$RUNNER_TEMP/installer-cert.p12" \
                "$RUNNER_TEMP/profile.provisionprofile" || true
          rm -rf "$RUNNER_TEMP/private_keys" "$HOME/.appstoreconnect/private_keys" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.provisionprofile \
                "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.provisionprofile || true

  # ── visionOS (Apple Vision Pro App Store TestFlight) ───────────────────────
  # ADR-0004 §7 Amendment 1. Closest to the iOS job: visionOS REUSES the iOS
  # "Apple Distribution" certificate (no visionOS-specific cert type exists) and
  # uses .mobileprovision profiles (like iOS, NOT macOS's .provisionprofile). The
  # only platform-specific input is the visionOS App Store provisioning profile.
  # Export yields an .ipa (visionOS shares the iOS app-container model), uploaded
  # with `altool --type visionos`. Gated on the SHARED iOS cert + the visionOS
  # profile + shared ASC/team secrets.
  guard-visionos:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          # visionOS reuses the iOS Apple Distribution cert — same secret.
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE: ${{ secrets.VISIONOS_PROVISIONING_PROFILE_BASE64 }}
          ASC_KEY: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
          TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CERT" ] && [ -n "$PROFILE" ] && [ -n "$ASC_KEY" ] \
             && [ -n "$ASC_KEY_ID" ] && [ -n "$ASC_ISSUER" ] && [ -n "$TEAM" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::visionOS TestFlight secrets not fully configured — skipping. Required: IOS_DIST_CERT_P12_BASE64 (shared with iOS), VISIONOS_PROVISIONING_PROFILE_BASE64, ASC_API_KEY_P8_BASE64, ASC_API_KEY_ID, ASC_API_ISSUER_ID, APPLE_TEAM_ID. See docs/testflight-setup.md §3."
          fi

  archive-and-upload-visionos:
    needs: guard-visionos
    if: needs.guard-visionos.outputs.ready == 'true'
    runs-on: macos-26
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain + Apple targets
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: >-
            aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-visionos,aarch64-apple-visionos-sim,aarch64-apple-watchos,aarch64-apple-watchos-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install xcodegen
        run: brew install xcodegen

      # Import the (iOS-shared) Apple Distribution identity + the visionOS App Store
      # provisioning profile into a throwaway keychain. visionOS profiles use the
      # .mobileprovision extension and the legacy Provisioning Profiles dir (same as
      # iOS); install into both the legacy and Xcode 16+ dirs to be version-proof.
      - name: Set up signing keychain
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.VISIONOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/tp-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"
          for DIR in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$DIR"
            cp "$PROFILE_PATH" "$DIR/$UUID.mobileprovision"
          done

          echo "TP_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "✅ visionOS signing keychain + profile ready (profile UUID $UUID)"

      - name: Archive + export App Store .ipa
        id: archive
        env:
          TP_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          # The visionOS archive uses ONLY the xcframework's xros-arm64 slice — it
          # never embeds the companion watch (that ships exclusively in the iOS .ipa,
          # #123). build-xcframework.sh nonetheless builds ALL platform slices, and
          # the watchOS-DEVICE arm64_32 sub-slice is a Rust tier-3 target needing the
          # nightly toolchain + rust-src (-Zbuild-std). This job installs only the
          # stable 1.96.0 toolchain, so without this flag the build dies "nightly
          # rust-src missing". TP_SKIP_ARM64_32=1 skips that watch-device sub-slice,
          # which visionOS does not need. (The iOS job keeps it — it needs it.)
          TP_SKIP_ARM64_32: "1"
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          export TP_BUILD_NUMBER=$(( RUN_NUMBER * 100 + RUN_ATTEMPT ))
          IPA="$(TP_PLATFORM=visionos scripts/ios.sh archive)"
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          IPA_PATH: ${{ steps.archive.outputs.ipa }}
        run: |
          set -euo pipefail
          KEYS_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$KEYS_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEYS_DIR/AuthKey_${ASC_API_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/"

          # visionOS uploads an .ipa (iOS container model). `--type visionos` is a
          # valid altool type (requires Xcode 15.2+; the macos-26 runner satisfies it).
          xcrun altool --upload-app \
            --type visionos \
            --file "$IPA_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
          echo "✅ uploaded $IPA_PATH to App Store Connect (TestFlight processing)"

      - name: Clean up signing keychain
        if: always()
        run: |
          if [ -n "${TP_KEYCHAIN:-}" ] && [ -f "$TP_KEYCHAIN" ]; then
            security delete-keychain "$TP_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/dist-cert.p12" "$RUNNER_TEMP/profile.mobileprovision" || true
          rm -rf "$RUNNER_TEMP/private_keys" "$HOME/.appstoreconnect/private_keys" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision \
                "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision || true
