name: Preview Deploy
on:
  push:
    branches: ['main']
jobs:
  build_ios:
    type: build
    params:
      platform: ios
      profile: preview
  build_android:
    type: build
    params:
      platform: android
      profile: preview
  submit_ios:
    name: Submit iOS to TestFlight
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
  submit_android:
    name: Submit Android to Internal
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
