# XcodeGen spec — Teleprompter native multiplatform app (ADR-0001 + ADR-0002).
#
# Supports iOS Simulator, iPadOS, native macOS (NOT Catalyst), and visionOS
# from ONE target (Phase A + B2). watchOS is a separate target, Phase B3.
#
# The generated Teleprompter.xcodeproj is NOT checked in (see ios/.gitignore);
# regenerate it reproducibly with `xcodegen generate` (or scripts/ios.sh gen).
#
# Driven headlessly by scripts/ios.sh:
#   TP_PLATFORM=ios      (default) — Simulator build → install → launch → smoke-test
#   TP_PLATFORM=macos              — native macOS build → open → verify from host log
#   TP_PLATFORM=visionos           — visionOS Simulator build → install → launch → smoke-test

name: Teleprompter
options:
  bundleIdPrefix: dev.tpmt
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    visionOS: "2.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"

settings:
  base:
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 6 strictness — the full ladder, each rung verified clean locally
    # (macOS + iOS Simulator builds) before landing (see ios/README.md →
    # "Swift strictness"). The native rewrite was written concurrency-correct from
    # the start, so all three rungs build with ZERO diagnostics — no burn-down
    # phase was needed and the rungs are applied together:
    #   1. SWIFT_STRICT_CONCURRENCY=complete — full Swift-6 data-race checking.
    #   2. SWIFT_VERSION=6.0 — Swift 6 language mode (data-race safety as ERRORS,
    #      @MainActor-by-default for the module is NOT enabled; explicit isolation).
    #   3. SWIFT_TREAT_WARNINGS_AS_ERRORS=YES — no warning may regress silently.
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "YES"
    # Ad-hoc sign Simulator/Debug builds so entitlements (keychain-access-groups)
    # are embedded. Without an entitlement the Simulator Keychain rejects SecItemAdd
    # with errSecMissingEntitlement (-34018). Ad-hoc ("-") needs no developer
    # identity and the Simulator accepts it. Same applies to macOS local builds.
    # QUALIFIED to Debug: every build/smoke/test path uses -configuration Debug
    # (scripts/ios.sh cmd_build/cmd_test) while ONLY the TestFlight archive uses
    # -configuration Release (cmd_archive). A device/MAS Release archive MUST sign
    # with a real Apple Distribution identity + provisioning profile (ad-hoc is
    # rejected by device SDKs: "Ad Hoc code signing is not allowed with SDK …"),
    # so each shipping target carries [config=Release][sdk=…] manual-signing keys.
    "CODE_SIGN_IDENTITY[config=Debug]": "-"
    "CODE_SIGNING_REQUIRED[config=Debug]": "NO"
    "CODE_SIGNING_ALLOWED[config=Debug]": "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Teleprompter:
    type: application
    # platform: auto + supportedDestinations enables multiplatform from one target.
    # iPadOS is implicitly included in the iOS destination via TARGETED_DEVICE_FAMILY
    # (injected by the iOS setting preset: "1,2" = iPhone+iPad). Do NOT add a
    # hardcoded TARGETED_DEVICE_FAMILY here — the presets handle it per-destination.
    platform: auto
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: Sources
      # UniFFI-generated Swift bindings for the Rust core (tp-core). Produced by
      # `scripts/ios.sh rust` (= rust/build-xcframework.sh); gitignored. The dir
      # may be empty before the first Rust build — generateEmptyDirectories keeps
      # the project valid; `scripts/ios.sh build` regenerates it on demand.
      - path: Generated
        optional: true
      # App icon asset catalog. Contains AppIcon.appiconset with universal iOS
      # 1024×1024 + macOS idiom PNGs. Wired via ASSETCATALOG_COMPILER_APPICON_NAME.
      - path: Assets.xcassets
    dependencies:
      # tp-core static library (byte-exact wire primitives). Not embedded — a
      # static archive links into the binary directly. The xcframework contains
      # 7 slices: ios-arm64 (device), ios-arm64_x86_64-simulator, macos-arm64_x86_64,
      # xros-arm64 (visionOS device, B2), xros-arm64-simulator (visionOS sim, B2),
      # watchos-arm64 (watch device, B3), watchos-arm64-simulator (watch sim, B3).
      - framework: ../rust/target/TpCore.xcframework
        embed: false
      # SwiftTerm: VT100/xterm emulator for the Terminal tab (A1 ANSI milestone).
      - package: SwiftTerm
      # Companion watch embed (#123, ADR-0004 Amendment 2). The watch app ships
      # INSIDE this iOS app's .ipa under Payload/Teleprompter.app/Watch/, so the
      # whole bundle has ONE App Store Connect record (dev.tpmt.app) instead of a
      # separate watchapp2-container record. `destinationFilters: [iOS]` scopes the
      # "Embed Watch Content" copy phase to the iOS destination ONLY — the macOS and
      # visionOS slices of this multiplatform target never try to embed a watchOS
      # app (which would break the macOS swift-build CI gate). XcodeGen 2.45.4
      # auto-wires the copy phase with `platformFilters = (ios,)` (empirically
      # verified: macOS BUILD SUCCEEDED with the embed present). The watch app still
      # keeps WKRunsIndependentlyOfCompanionApp=YES so it runs standalone on Apple
      # Watch away from the iPhone — companion DISTRIBUTION, standalone RUNTIME.
      - target: TeleprompterWatch
        embed: true
        destinationFilters: [iOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.app
        # iOS entitlements (keychain-access-groups for Simulator Keychain).
        # macOS overrides this with the sandbox + network.client entitlements file.
        CODE_SIGN_ENTITLEMENTS: Teleprompter.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Teleprompter-macOS.entitlements
        # Wire the AppIcon asset catalog into iOS and macOS targets.
        # visionOS uses a separate .solidimagestack asset (AppIconVision) because
        # visionOS requires a layered icon composed of Back/Middle/Front layers —
        # a flat .appiconset is not accepted by altool (error 90970: missing
        # CFBundleIcons.CFBundlePrimaryIcon). The solidimagestack layers are opaque
        # 1024×1024 PNGs (no alpha) derived from the same flattened AppIcon source.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        "ASSETCATALOG_COMPILER_APPICON_NAME[sdk=xros*]": AppIconVision
        # TestFlight archive (Release) manual signing, PER DEVICE SDK. xcodebuild
        # CLI build-setting overrides apply GLOBALLY to all targets in one archive,
        # so per-target/per-platform profile mapping CANNOT live in cmd_archive — it
        # must be baked here. Manual signing REQUIRES an explicit
        # PROVISIONING_PROFILE_SPECIFIER per (target, SDK); xcodebuild does NOT
        # auto-resolve a profile by bundle id in Manual mode. Profile NAMES (stable,
        # the SoT) are created by scripts/setup-testflight-secrets.sh — iOS :423,
        # visionOS :429, macOS :446. CODE_SIGN_IDENTITY "Apple Distribution"
        # resolves the imported dist cert in the throwaway CI keychain.
        # DEVELOPMENT_TEAM is supplied at archive time (TP_DEVELOPMENT_TEAM, global
        # CLI override — correct since all targets share one team). Debug/Simulator
        # stays ad-hoc (project base [config=Debug] keys). iphoneos covers iOS+iPadOS.
        "CODE_SIGN_STYLE[config=Release]": Manual
        "CODE_SIGN_IDENTITY[config=Release][sdk=iphoneos*]": "Apple Distribution"
        "CODE_SIGNING_REQUIRED[config=Release][sdk=iphoneos*]": "YES"
        "CODE_SIGNING_ALLOWED[config=Release][sdk=iphoneos*]": "YES"
        "PROVISIONING_PROFILE_SPECIFIER[config=Release][sdk=iphoneos*]": "Teleprompter iOS App Store"
        "CODE_SIGN_IDENTITY[config=Release][sdk=macosx*]": "Apple Distribution"
        "CODE_SIGNING_REQUIRED[config=Release][sdk=macosx*]": "YES"
        "CODE_SIGNING_ALLOWED[config=Release][sdk=macosx*]": "YES"
        "PROVISIONING_PROFILE_SPECIFIER[config=Release][sdk=macosx*]": "Teleprompter macOS App Store"
        "CODE_SIGN_IDENTITY[config=Release][sdk=xros*]": "Apple Distribution"
        "CODE_SIGNING_REQUIRED[config=Release][sdk=xros*]": "YES"
        "CODE_SIGNING_ALLOWED[config=Release][sdk=xros*]": "YES"
        "PROVISIONING_PROFILE_SPECIFIER[config=Release][sdk=xros*]": "Teleprompter visionOS App Store"
    # Explicit Info.plist (checked in) so we can register the custom `tp://` URL
    # scheme — CFBundleURLTypes has no INFOPLIST_KEY_* equivalent, so a generated
    # plist won't carry it. XcodeGen writes this file from `properties` and points
    # INFOPLIST_FILE at it.
    #
    # UI* keys (UILaunchScreen, UIApplicationSceneManifest,
    # UIApplicationSupportsIndirectInputEvents) are iOS/iPadOS-only; AppKit ignores
    # them silently on macOS — the macOS build succeeds without any plist split.
    # Verified: macOS xcodebuild reaches the linker with no plist-related errors.
    info:
      path: Teleprompter-Info.plist
      properties:
        CFBundleDisplayName: Teleprompter
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        # Export-compliance declaration so TestFlight/App Store uploads do not
        # stall in "Missing Compliance". The app's only cryptography is the
        # standard XChaCha20-Poly1305/X25519 used to secure its OWN traffic to the
        # relay (libsodium primitives), which qualifies for the export exemption
        # under U.S. EAR 740.17(b)(1) — so we declare non-exempt = false. If a
        # non-standard/proprietary cipher is ever added, revisit this and the
        # annual self-classification report obligation.
        ITSAppUsesNonExemptEncryption: false
        # Usage descriptions for runtime-permission features (feature-parity with
        # the old Expo app). Declared up front so the parallel feature tranches
        # (Daemons/Pairing QR scan, Voice) never have to edit this shared file.
        #   - Camera: in-app QR pairing scan (AVCaptureSession metadata output).
        #   - Microphone: voice control (AVAudioEngine capture — both the
        #     OpenAI Realtime backend and the on-device Apple Speech backend).
        #   - Speech recognition: on-device STT via SFSpeechRecognizer when the
        #     voice backend is set to on-device (offline) mode. Audio stays on
        #     device (requiresOnDeviceRecognition); no audio leaves the phone.
        NSCameraUsageDescription: >-
          Teleprompter uses the camera to scan a pairing QR code shown by the
          tp CLI, so this device can securely connect to your daemon.
        NSMicrophoneUsageDescription: >-
          Teleprompter uses the microphone for voice control of your Claude Code
          session, either on-device (offline) or via the OpenAI Realtime API.
        NSSpeechRecognitionUsageDescription: >-
          Teleprompter transcribes your voice on this device to turn spoken
          requests into prompts for your Claude Code session.
        # App Transport Security. Production relay is `wss://relay.tpmt.dev` (TLS),
        # which needs no exception. The local loopback relay used by the smoke
        # test (`ws://localhost:7090`) is cleartext, so allow local networking —
        # the narrow exemption (loopback + .local + link-local), not arbitrary loads.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Scene manifest is required for the scene lifecycle to deliver inbound
        # URL contexts to the scene delegate. SwiftUI normally auto-injects this
        # when GENERATE_INFOPLIST_FILE=YES; an explicit plist must declare the
        # full scene configuration (with a named delegate class) or `tp://` deep
        # links never reach the app on the iOS 26 Simulator.
        # No UISceneDelegateClassName — SwiftUI's WindowGroup owns the scene and
        # bridges inbound URL contexts to `.onOpenURL`. Declaring our own scene
        # delegate is ignored by SwiftUI; the manifest's presence alone is what
        # `.onOpenURL` needs to receive `tp://` deep links.
        # On macOS (native, not Catalyst) SwiftUI's WindowGroup works without a
        # scene manifest — the key is ignored by AppKit.
        #
        # Supported interface orientations. REQUIRED for App Store / TestFlight
        # upload: altool rejected the .ipa with "Invalid bundle. No orientations
        # were specified in the dev.tpmt.app bundle … specify the
        # UISupportedInterfaceOrientations Info.plist key" (90474). iPad apps must
        # declare all four orientations to support multitasking; the ~ipad
        # variant supplies that, while iPhone keeps the conventional three (no
        # upside-down). Both keys are iOS/iPadOS-only — AppKit (macOS) and
        # visionOS ignore them, so no per-platform plist split is needed (same as
        # the other UI* keys above).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
        # Required by App Store Connect (ASC error 90242) for Mac App Store /
        # TestFlight macOS submissions. This key is a valid optional key on all
        # Apple platforms and is a harmless no-op on iOS and visionOS — no
        # per-platform plist split is needed.
        LSApplicationCategoryType: public.app-category.developer-tools
        CFBundleURLTypes:
          - CFBundleURLName: dev.tpmt.app.pairing
            CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - tp

  TeleprompterTests:
    type: bundle.unit-test
    # Multiplatform so the scheme's test action builds on a macOS destination too
    # (when cmd_uitest runs UI tests for platform=macOS, xcodebuild still BUILDS
    # every test-action target; a platform:iOS unit-test target would pin its
    # TEST_HOST to an iOS .app and break the macOS build). The tests are pure
    # logic + a direct SwiftTerm.Terminal drive, so they compile on macOS.
    platform: auto
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests
    dependencies:
      - target: Teleprompter
      # SwiftTerm must be added directly to the test bundle: @testable import
      # Teleprompter does NOT re-export SwiftTerm, so the SwiftTerm.Terminal type
      # used in TerminalEmulatorTests is unreachable from the test bundle otherwise.
      # (HeadlessTerminal is #if !os(iOS) — unavailable on the iOS test target — so
      # the tests drive Terminal directly with a minimal TerminalDelegate stub.)
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.app.tests
        GENERATE_INFOPLIST_FILE: "YES"

  # UI-level E2E (T3, #66). A bundle.ui-testing target drives the REAL app through
  # the Accessibility tree with XCUIApplication: it launches with --tp-smoke-url
  # (reusing the same golden loopback path as the marker smoke), then taps the
  # session row → pane picker and asserts the rendered chat bubble. This is the
  # only layer that proves SwiftUI actually RENDERS the decrypted wire data, not
  # just that the bytes round-tripped (which the markers already cover).
  #
  # Multiplatform UI-test target: XCUITest runs on the iOS/iPadOS Simulator AND
  # native macOS (via the platform=macOS destination). It must match the app's
  # supportedDestinations so the scheme's test action resolves a macOS test host
  # when built for macOS (a platform:iOS test target pins TEST_HOST to an iOS
  # .app and the macOS build fails to find it). visionOS rides the iOS UI runner
  # (partial reach — element queries + flat-window taps). watchOS has NO
  # XCUIApplication (Apple hard limit), so it is never listed and never UI-tested
  # (markers + screenshot only there).
  TeleprompterUITests:
    type: bundle.ui-testing
    platform: auto
    supportedDestinations: [iOS, macOS]
    sources:
      - path: UITests
    dependencies:
      - target: Teleprompter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        # The target app the runner automates (XCUIApplication() with no bundle id
        # resolves to this).
        TEST_TARGET_NAME: Teleprompter

  # B3 (ADR-0002): standalone watchOS app — glance UI with session list +
  # last assistant message + approve/deny. Reuses relay/pairing/session layers
  # from the main app; excludes UIKit-only (SwiftTermView, NotificationService,
  # QRScannerView) and voice sources. Separate target, separate bundle.
  TeleprompterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      # Watch-specific app sources (entry point + glance views)
      - path: Watch/Sources
      # Shared platform-neutral Swift sources (relay, pairing, session, core).
      # EXCLUDED: SwiftTermView (UIKit), NotificationService (APNs/iOS),
      #           QRScannerView (AVFoundation), voice, all main-app views.
      - path: Sources/Relay/RelayClient.swift
      - path: Sources/Relay/RelayMessages.swift
      - path: Sources/Relay/RelaySessionOps.swift
      # RelayClient calls onWorktree*/onControlErr, defined in this RelayClient
      # extension. Platform-neutral (Foundation + os only — no UIKit/iOS deps),
      # so it builds on watchOS. Omitting it broke the watch build with
      # "cannot find 'onWorktreeList' in scope".
      - path: Sources/Relay/RelayWorktreeOps.swift
      - path: Sources/Pairing/PairingStore.swift
      - path: Sources/Pairing/DeepLinkHandler.swift
      - path: Sources/Pairing/PairingRelayOps.swift
      - path: Sources/Session/SessionStore.swift
      # WorktreeStore backs onWorktree*/onControlErr (RelayWorktreeOps). Mirrors
      # SessionStore (@MainActor + ObservableObject, Foundation + os only — no
      # UIKit/SwiftUI-iOS), so it builds on watchOS.
      - path: Sources/Session/WorktreeStore.swift
      - path: Sources/TpCoreCheck.swift
      # TerminalOps provides SessionStore+terminal callback properties used by
      # RelayClient. Safe on watchOS (Foundation + ObjectiveC only; no UIKit).
      - path: Sources/Session/Terminal/TerminalOps.swift
      - path: Generated
        optional: true
      # Watch-specific asset catalog. Contains WatchAppIcon.appiconset with the
      # marketing icon (1024×1024, opaque, watchos platform). Wired via
      # ASSETCATALOG_COMPILER_APPICON_NAME so Xcode generates CFBundleIconName in
      # the watch app's Info.plist — required by App Store Connect (error 90713:
      # "Missing Info.plist value … CFBundleIconName in dev.tpmt.app.watchkitapp").
      - path: Watch/Assets.xcassets
    dependencies:
      # tp-core static library — watchOS slices added in B3. Not embedded.
      - framework: ../rust/target/TpCore.xcframework
        embed: false
    settings:
      base:
        # App icon for the watch target — generates CFBundleIconName in the watch
        # app's Info.plist (required by ASC, fixes error 90713).
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        # Companion watch app embedded in the main iOS app (#123, ADR-0004 Amdt 2).
        # The watch app ships inside dev.tpmt.app's .ipa (one ASC record). Apple's
        # WatchKit layout requires the watch app id to be <companion-id>.watchkitapp,
        # so the id is dev.tpmt.app.watchkitapp (the .watch container record is gone).
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.app.watchkitapp
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Teleprompter
        # Standalone RUNTIME despite companion DISTRIBUTION. IsIndependentApp +
        # WKRunsIndependentlyOfCompanionApp=YES keep the watch app runnable on Apple
        # Watch with the iPhone out of range — the user just configures it once on
        # the iPhone (where the companion iOS app installs it), then it runs alone.
        INFOPLIST_KEY_WKApplication_IsIndependentApp: "YES"
        # The companion is now the real main iOS app (dev.tpmt.app), not an empty
        # container. This is what makes the embed a true companion install.
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: "dev.tpmt.app"
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: "YES"
        # Debug/Simulator: ad-hoc (the watchOS Simulator smoke build runs Debug;
        # Simulator Keychain accepts "-"). QUALIFIED to Debug so the Release DEVICE
        # archive does NOT inherit ad-hoc — a watchOS DEVICE SDK rejects it ("Ad Hoc
        # code signing is not allowed with SDK watchOS …", the exact archive failure).
        "CODE_SIGN_IDENTITY[config=Debug]": "-"
        "CODE_SIGNING_REQUIRED[config=Debug]": "NO"
        "CODE_SIGNING_ALLOWED[config=Debug]": "YES"
        # Release/device archive: the embedded companion watch signs with the same
        # Apple Distribution cert + its OWN App Store profile (name from
        # scripts/setup-testflight-secrets.sh:441). A per-target specifier is the
        # ONLY way to map watch→its profile — one xcodebuild archive applies CLI
        # overrides globally and cannot differ per target.
        "CODE_SIGN_STYLE[config=Release]": Manual
        "CODE_SIGN_IDENTITY[config=Release]": "Apple Distribution"
        "CODE_SIGNING_REQUIRED[config=Release]": "YES"
        "CODE_SIGNING_ALLOWED[config=Release]": "YES"
        "PROVISIONING_PROFILE_SPECIFIER[config=Release]": "Teleprompter watch app App Store"
        # Allow Simulator builds alongside real-device watchOS builds.
        # Without this, xcodebuild only exposes real-device destinations (SDKROOT=watchos).
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        # Exclude x86_64 from the watchOS Simulator slice. TpCore.xcframework's
        # watchos-arm64-simulator slice is arm64-ONLY (no x86_64). When this watch
        # app is built EMBEDDED in the iOS app (#123) for the iOS Simulator, Xcode
        # builds the watch for the watchOS Simulator using THIS target's ARCHS — and
        # ONLY_ACTIVE_ARCH on the iOS app does NOT propagate across the platform
        # boundary, so the watch would otherwise build the full watchsimulator arch
        # list (arm64 + x86_64) and fail to link "symbol(s) not found for x86_64".
        # All dev/CI Macs are arm64, so excluding x86_64 here is safe. The device
        # archive (SDKROOT=watchos) is unaffected — that uses arm64 + arm64_32, both
        # present in the xcframework. This holds in BOTH the embedded build and the
        # standalone smoke build (which also passes ARCHS=arm64 on the CLI).
        "EXCLUDED_ARCHS[sdk=watchsimulator*]": x86_64
        # Export-compliance: the embedded watch app (Payload/Teleprompter.app/Watch/)
        # carries its OWN Info.plist (GENERATE_INFOPLIST_FILE=YES), so it needs its
        # own ITSAppUsesNonExemptEncryption — the host iOS app's key (Teleprompter
        # target, ITSAppUsesNonExemptEncryption: false) does NOT cover the embedded
        # watch slice. Without this, ASC puts the WHOLE build in "Missing Compliance"
        # hold and no TestFlight tester can install it. We use only standard
        # XChaCha20/X25519 (EAR 740.17(b)(1) exempt), same as the host. NOTE: the
        # GENERATE_INFOPLIST_FILE path takes a *string* "NO" (the host app sets the
        # raw plist boolean `false`; here it is an INFOPLIST_KEY_* build setting).
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"

  # (TeleprompterWatchContainer removed in #123 / ADR-0004 Amendment 2.) The watch
  # app is now a companion embedded directly in the main iOS app (see the
  # `- target: TeleprompterWatch` embed on the Teleprompter target above), so the
  # separate watchapp2-container distribution wrapper — and its second ASC record
  # (dev.tpmt.app.watch) — are no longer needed. The watch ships inside the main
  # app's .ipa under Payload/Teleprompter.app/Watch/ and uploads on the single
  # dev.tpmt.app record. It still runs standalone on Apple Watch
  # (WKRunsIndependentlyOfCompanionApp=YES).

schemes:
  Teleprompter:
    build:
      targets:
        Teleprompter: all
        TeleprompterTests: [test]
    run:
      config: Debug
    # Test action = UNIT tests only. The UI tests live in their own
    # TeleprompterUITests scheme (driven by cmd_uitest) so `cmd_test` (XCTest) never
    # tries to run them without the loopback relay + injected TP_SMOKE_URL (which
    # would fail the unrelated unit run). Keeps the two layers cleanly separated.
    test:
      config: Debug
      targets:
        - TeleprompterTests

  # Dedicated UI-test scheme (cmd_uitest). Its test action contains ONLY
  # TeleprompterUITests, so building/running it on a macOS destination never drags
  # in the iOS-hosted unit-test target (whose TEST_HOST is wired for the iOS .app
  # bundle layout and breaks the macOS build). The main `Teleprompter` scheme keeps
  # both test targets for cmd_test/cmd_smoke on iOS.
  TeleprompterUITests:
    build:
      targets:
        Teleprompter: all
        TeleprompterUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TeleprompterUITests

  # Watch RUNTIME smoke scheme (scripts/ios.sh, TP_PLATFORM=watchos). Builds the
  # watch app directly on the watchOS Simulator to prove it boots + the wire/E2EE
  # path works (7 markers). This is the standalone-runtime proof and is SEPARATE
  # from distribution — for TestFlight the watch ships embedded in the main iOS .ipa
  # (companion), archived via the Teleprompter scheme, NOT this one (#123).
  TeleprompterWatch:
    build:
      targets:
        TeleprompterWatch: all
    run:
      config: Debug

  # (TeleprompterWatchContainer scheme removed in #123 / ADR-0004 Amdt 2.) The watch
  # now ships embedded in the main app, so the TestFlight watch archive rides the
  # `Teleprompter` scheme's iOS archive (the Embed Watch Content phase pulls in
  # TeleprompterWatch on the iOS destination) — there is no separate container
  # scheme to archive.
