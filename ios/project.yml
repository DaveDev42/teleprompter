# XcodeGen spec — Teleprompter native iOS app (ADR-0001 rewrite).
#
# The generated Teleprompter.xcodeproj is NOT checked in (see ios/.gitignore);
# regenerate it reproducibly with `xcodegen generate` (or scripts/ios.sh gen).
#
# Driven headlessly by scripts/ios.sh: build → install → launch → smoke-test
# on the iOS Simulator, no Xcode GUI required.

name: Teleprompter
options:
  bundleIdPrefix: dev.tpmt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: "NO" # Simulator builds need no signing.
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Teleprompter:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.teleprompter
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Teleprompter
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad.
        GENERATE_INFOPLIST_FILE: "YES"

  TeleprompterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Teleprompter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.teleprompter.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Teleprompter:
    build:
      targets:
        Teleprompter: all
        TeleprompterTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TeleprompterTests
