# XcodeGen spec — Teleprompter native multiplatform app (ADR-0001 + ADR-0002).
#
# Supports iOS Simulator, iPadOS, native macOS (NOT Catalyst), and visionOS
# from ONE target (Phase A + B2). watchOS is a separate target, Phase B3.
#
# The generated Teleprompter.xcodeproj is NOT checked in (see ios/.gitignore);
# regenerate it reproducibly with `xcodegen generate` (or scripts/ios.sh gen).
#
# Driven headlessly by scripts/ios.sh:
#   TP_PLATFORM=ios      (default) — Simulator build → install → launch → smoke-test
#   TP_PLATFORM=macos              — native macOS build → open → verify from host log
#   TP_PLATFORM=visionos           — visionOS Simulator build → install → launch → smoke-test

name: Teleprompter
options:
  bundleIdPrefix: dev.tpmt
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    visionOS: "2.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"

settings:
  base:
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Ad-hoc sign Simulator builds so entitlements (keychain-access-groups) are
    # embedded. Without an entitlement the Simulator Keychain rejects SecItemAdd
    # with errSecMissingEntitlement (-34018). Ad-hoc ("-") needs no developer
    # identity and the Simulator accepts it. Same applies to macOS local builds.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"

targets:
  Teleprompter:
    type: application
    # platform: auto + supportedDestinations enables multiplatform from one target.
    # iPadOS is implicitly included in the iOS destination via TARGETED_DEVICE_FAMILY
    # (injected by the iOS setting preset: "1,2" = iPhone+iPad). Do NOT add a
    # hardcoded TARGETED_DEVICE_FAMILY here — the presets handle it per-destination.
    platform: auto
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: Sources
      # UniFFI-generated Swift bindings for the Rust core (tp-core). Produced by
      # `scripts/ios.sh rust` (= rust/build-xcframework.sh); gitignored. The dir
      # may be empty before the first Rust build — generateEmptyDirectories keeps
      # the project valid; `scripts/ios.sh build` regenerates it on demand.
      - path: Generated
        optional: true
      # App icon asset catalog. Contains AppIcon.appiconset with universal iOS
      # 1024×1024 + macOS idiom PNGs. Wired via ASSETCATALOG_COMPILER_APPICON_NAME.
      - path: Assets.xcassets
    dependencies:
      # tp-core static library (byte-exact wire primitives). Not embedded — a
      # static archive links into the binary directly. The xcframework contains
      # 5 slices: ios-arm64 (device), ios-arm64_x86_64-simulator, macos-arm64_x86_64,
      # xros-arm64 (visionOS device, B2), xros-arm64-simulator (visionOS sim, B2).
      - framework: ../rust/target/TpCore.xcframework
        embed: false
      # SwiftTerm: VT100/xterm emulator for the Terminal tab (A1 ANSI milestone).
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.teleprompter
        # iOS entitlements (keychain-access-groups for Simulator Keychain).
        # macOS overrides this with the sandbox + network.client entitlements file.
        CODE_SIGN_ENTITLEMENTS: Teleprompter.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Teleprompter-macOS.entitlements
        # Wire the AppIcon asset catalog into both iOS and macOS targets.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Explicit Info.plist (checked in) so we can register the custom `tp://` URL
    # scheme — CFBundleURLTypes has no INFOPLIST_KEY_* equivalent, so a generated
    # plist won't carry it. XcodeGen writes this file from `properties` and points
    # INFOPLIST_FILE at it.
    #
    # UI* keys (UILaunchScreen, UIApplicationSceneManifest,
    # UIApplicationSupportsIndirectInputEvents) are iOS/iPadOS-only; AppKit ignores
    # them silently on macOS — the macOS build succeeds without any plist split.
    # Verified: macOS xcodebuild reaches the linker with no plist-related errors.
    info:
      path: Teleprompter-Info.plist
      properties:
        CFBundleDisplayName: Teleprompter
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        # Usage descriptions for runtime-permission features (feature-parity with
        # the old Expo app). Declared up front so the parallel feature tranches
        # (Daemons/Pairing QR scan, Voice) never have to edit this shared file.
        #   - Camera: in-app QR pairing scan (AVCaptureSession metadata output).
        #   - Microphone: OpenAI Realtime voice (AVAudioEngine capture).
        NSCameraUsageDescription: >-
          Teleprompter uses the camera to scan a pairing QR code shown by the
          tp CLI, so this device can securely connect to your daemon.
        NSMicrophoneUsageDescription: >-
          Teleprompter uses the microphone for voice control of your Claude Code
          session via the OpenAI Realtime API.
        # App Transport Security. Production relay is `wss://relay.tpmt.dev` (TLS),
        # which needs no exception. The local loopback relay used by the smoke
        # test (`ws://localhost:7090`) is cleartext, so allow local networking —
        # the narrow exemption (loopback + .local + link-local), not arbitrary loads.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Scene manifest is required for the scene lifecycle to deliver inbound
        # URL contexts to the scene delegate. SwiftUI normally auto-injects this
        # when GENERATE_INFOPLIST_FILE=YES; an explicit plist must declare the
        # full scene configuration (with a named delegate class) or `tp://` deep
        # links never reach the app on the iOS 26 Simulator.
        # No UISceneDelegateClassName — SwiftUI's WindowGroup owns the scene and
        # bridges inbound URL contexts to `.onOpenURL`. Declaring our own scene
        # delegate is ignored by SwiftUI; the manifest's presence alone is what
        # `.onOpenURL` needs to receive `tp://` deep links.
        # On macOS (native, not Catalyst) SwiftUI's WindowGroup works without a
        # scene manifest — the key is ignored by AppKit.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
        CFBundleURLTypes:
          - CFBundleURLName: dev.tpmt.teleprompter.pairing
            CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - tp

  TeleprompterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Teleprompter
      # SwiftTerm must be added directly to the test bundle: @testable import
      # Teleprompter does NOT re-export SwiftTerm, so the SwiftTerm.Terminal type
      # used in TerminalEmulatorTests is unreachable from the test bundle otherwise.
      # (HeadlessTerminal is #if !os(iOS) — unavailable on the iOS test target — so
      # the tests drive Terminal directly with a minimal TerminalDelegate stub.)
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.teleprompter.tests
        GENERATE_INFOPLIST_FILE: "YES"

  # B3 (ADR-0002): standalone watchOS app — glance UI with session list +
  # last assistant message + approve/deny. Reuses relay/pairing/session layers
  # from the main app; excludes UIKit-only (SwiftTermView, NotificationService,
  # QRScannerView) and voice sources. Separate target, separate bundle.
  TeleprompterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      # Watch-specific app sources (entry point + glance views)
      - path: Watch/Sources
      # Shared platform-neutral Swift sources (relay, pairing, session, core).
      # EXCLUDED: SwiftTermView (UIKit), NotificationService (APNs/iOS),
      #           QRScannerView (AVFoundation), voice, all main-app views.
      - path: Sources/Relay/RelayClient.swift
      - path: Sources/Relay/RelayMessages.swift
      - path: Sources/Relay/RelaySessionOps.swift
      - path: Sources/Pairing/PairingStore.swift
      - path: Sources/Pairing/DeepLinkHandler.swift
      - path: Sources/Pairing/PairingRelayOps.swift
      - path: Sources/Session/SessionStore.swift
      - path: Sources/TpCoreCheck.swift
      # TerminalOps provides SessionStore+terminal callback properties used by
      # RelayClient. Safe on watchOS (Foundation + ObjectiveC only; no UIKit).
      - path: Sources/Session/Terminal/TerminalOps.swift
      - path: Generated
        optional: true
    dependencies:
      # tp-core static library — watchOS slices added in B3. Not embedded.
      - framework: ../rust/target/TpCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.tpmt.teleprompter.watch
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Teleprompter
        # Standalone watch app (not a watchOS extension of the iOS companion).
        INFOPLIST_KEY_WKApplication_IsIndependentApp: "YES"
        # simctl install validates bundle ID prefix against companion app's bundle ID.
        # Use the main app's bundle ID as the companion so the prefix check passes
        # (dev.tpmt.teleprompter → dev.tpmt.teleprompter.watch is a valid prefix).
        # WKRunsIndependentlyOfCompanionApp = YES makes it a truly standalone app
        # that works without the iOS companion installed.
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: "dev.tpmt.teleprompter"
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: "YES"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        # Allow Simulator builds alongside real-device watchOS builds.
        # Without this, xcodebuild only exposes real-device destinations (SDKROOT=watchos).
        SUPPORTED_PLATFORMS: "watchos watchsimulator"

schemes:
  Teleprompter:
    build:
      targets:
        Teleprompter: all
        TeleprompterTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TeleprompterTests

  TeleprompterWatch:
    build:
      targets:
        TeleprompterWatch: all
    run:
      config: Debug
