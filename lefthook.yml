# Lefthook — local git hooks. https://lefthook.dev
#
# Opt-in: install the lefthook binary (`brew install lefthook` on macOS, or any
# release binary — the npm devDependency route was removed with the Node
# toolchain in #5 PR7), then run `lefthook install` once. These hooks mirror
# CI's gates locally so breakage is caught before push, not in CI. CI remains
# the source of truth — hooks can be skipped with `LEFTHOOK=0 git commit` /
# `git push` in a pinch.
#
# Scope note: Swift is NOT hooked (xcodebuild is too slow for a hook and Swift
# isn't a CI gate — it's validated by scripts/ios.sh locally). Rust fmt+clippy+
# test run in pre-push only when rust/ files changed. There is no pre-commit
# hook: the Biome staged-file check died with the TS backend (#5 PR6/PR7).

pre-push:
  parallel: false
  commands:
    # Rust fmt + clippy + test — only when rust/ files changed.
    #    `cargo` on this machine is the Homebrew rustup shim, which mis-parses
    #    `cargo fmt --all` (the shim swallows `--all` instead of dispatching to
    #    cargo-fmt). Prepend the active toolchain's real bin dir — derived
    #    portably via `rustup which cargo` (honors rust-toolchain.toml on any
    #    host/CI) — so cargo-fmt/rustfmt resolve and the subcommands work.
    rust:
      glob: "rust/**/*.rs"
      run: |
        cd rust &&
        export PATH="$(dirname "$(rustup which cargo)"):$PATH" &&
        cargo fmt --all -- --check &&
        cargo clippy --workspace --all-targets &&
        cargo test --workspace
