[package]
name = "tp-relay"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Stage 1 relay server — RelayServerMessage serde core + framing helpers. No axum/tokio yet (Step 2 pure (de)serialization layer)."

[lib]
name = "tp_relay"
# Plain rlib only. NOT staticlib/cdylib — host-only, no UniFFI.

[dependencies]
tp-proto = { path = "../tp-proto" }
tp-core = { path = "../tp-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
